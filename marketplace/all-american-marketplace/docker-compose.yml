version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: aam_postgres
    environment:
      POSTGRES_USER: aam
      POSTGRES_PASSWORD: aam_password
      POSTGRES_DB: aam_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: aam_redis
    ports:
      - "6379:6379"

  api-gateway:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./services/api-gateway:/app
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
