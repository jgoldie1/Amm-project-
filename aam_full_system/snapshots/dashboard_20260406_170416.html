<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login</title>
  <style>
    body { font-family: Arial, sans-serif; background:radial-gradient(circle at top, #13203f 0%, #081120 45%, #030712 100%); color:#e2e8f0; margin:0; padding:20px; }
    .topbar,.card { background:linear-gradient(180deg, rgba(17,24,39,.94), rgba(15,23,42,.90)); border:1px solid rgba(96,165,250,.30); border-radius:18px; padding:16px; box-shadow:0 0 24px rgba(37,99,235,.14), inset 0 0 18px rgba(255,255,255,.02); backdrop-filter:blur(10px); }
    .topbar { margin-bottom:20px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; }
    .section { margin-top:24px; }
    .pill { display:inline-block; padding:6px 10px; background:linear-gradient(90deg,#2563eb,#7c3aed); border-radius:999px; margin-right:6px; margin-top:6px; font-size:13px; box-shadow:0 0 12px rgba(59,130,246,.35); }
    .hero { padding:24px; border-radius:22px; background:linear-gradient(135deg, rgba(37,99,235,.20), rgba(124,58,237,.18), rgba(6,182,212,.14)); border:1px solid rgba(96,165,250,.34); box-shadow:0 0 30px rgba(59,130,246,.18); }
    .hero h2 { margin-top:0; font-size:30px; }
    .hero p { color:#cbd5e1; }
    .launch-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; margin-top:16px; }
    .launch-tile { display:block; padding:18px; border-radius:18px; text-decoration:none; color:#fff; background:linear-gradient(135deg, rgba(30,41,59,.96), rgba(37,99,235,.28)); border:1px solid rgba(96,165,250,.28); box-shadow:0 0 18px rgba(37,99,235,.16); }
    .launch-tile strong { display:block; font-size:16px; margin-bottom:6px; }
    a,button { color:white; background:linear-gradient(90deg,#2563eb,#4f46e5); border:none; border-radius:10px; padding:10px 14px; text-decoration:none; display:inline-block; margin-right:8px; cursor:pointer; box-shadow:0 0 10px rgba(37,99,235,.25); }
    a.secondary { background:#475569; }
    a.danger, button.danger { background:#b91c1c; }
    ul { padding-left:18px; }
    .muted { color:#94a3b8; }
    input,select,textarea { width:100%; box-sizing:border-box; padding:10px; margin:8px 0 12px 0; border-radius:10px; border:1px solid #334155; background:#020617; color:#e2e8f0; }
    .ok { color:#86efac; }
    .warn { color:#fbbf24; }
    .danger-text { color:#fca5a5; }
    table { width:100%; border-collapse:collapse; }
    th,td { border-bottom:1px solid #334155; text-align:left; padding:10px; vertical-align:top; }
    form.inline { display:inline; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>All American Marketplace OS</h1>
    <p class="muted">Marketplace • University • Archive • Business Manager • FinBank • Jarvis</p>
    <div>
      <span class="pill">Live</span>
      <span class="pill">Port 4900</span>
