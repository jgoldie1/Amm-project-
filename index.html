<!DOCTYPE html>
<html>
<head>
  <title>Live Room</title>
  <style>
    body { background:black; color:white; text-align:center; font-family:sans-serif; }
    #chat { height:200px; overflow:auto; border:1px solid white; margin:10px; padding:5px; }
    button { padding:10px; margin:5px; }
  </style>
</head>
<body>

<h2>🔥 Live Streaming Room</h2>

<input id="name" placeholder="Enter username">
<button onclick="join()">Join</button>

<br><br>

<video id="video" autoplay width="300"></video>

<br>

<button onclick="sendHeart()">❤️ Tap</button>
<div>Hearts: <span id="hearts">0</span></div>

<br>

<input id="msg" placeholder="Say something">
<button onclick="sendMsg()">Send</button>

<div id="chat"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let username = "";

function join() {
  username = document.getElementById("name").value || "guest";
  socket.emit("join", username);

  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      document.getElementById("video").srcObject = stream;
    });
}

// comments
function sendMsg() {
  const msg = document.getElementById("msg").value;
  socket.emit("comment", msg);
  document.getElementById("msg").value = "";
}

socket.on("comment", (msg) => {
  const div = document.createElement("div");
  div.innerText = msg;
  document.getElementById("chat").appendChild(div);
});

// hearts (FIXED so no runaway loop)
socket.on("heart", (count) => {
  document.getElementById("hearts").innerText = count;
});

function sendHeart() {
  socket.emit("heart");
}

// 🔥 BOT SYSTEM (Gen Z style + usernames)
const botMessages = [
  "yo this live lit 🔥",
  "who else watching rn 👀",
  "drop hearts ❤️",
  "W stream fr",
  "spam chat let's go 💯"
];

setInterval(() => {
  const msg = botMessages[Math.floor(Math.random() * botMessages.length)];
  const fakeUser = "user" + Math.floor(Math.random() * 999);

  const div = document.createElement("div");
  div.innerText = `${fakeUser}: ${msg}`;
  document.getElementById("chat").appendChild(div);
}, 5000);

</script>

</body>
</html>
