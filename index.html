<!DOCTYPE html>
<html>
<head>
  <title>Live Room</title>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<h2>🔥 Live Room</h2>

<!-- USER LIST -->
<div>
  <h3>Users</h3>
  <div id="users"></div>
</div>

<!-- CHAT -->
<div>
  <h3>Chat</h3>
  <div id="chat" style="border:1px solid #000;height:150px;overflow:auto;"></div>
  <input id="msg" placeholder="Type message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<!-- LIKES -->
<div>
  ❤️ Likes: <span id="likeCount">0</span>
  <button onclick="sendLike()">Tap ❤️</button>
</div>

<!-- ADMIN -->
<div>
  <button onclick="muteUser()">Mute</button>
  <button onclick="kickUser()">Kick</button>
</div>

<script>
const socket = io();
let selectedUser = null;
let username = "";

// JOIN
username = prompt("Enter username:");
socket.emit("join", username);

// USER LIST
socket.on("userList", (list) => {
  const div = document.getElementById("users");
  div.innerHTML = "";

  Object.entries(list).forEach(([id, name]) => {
    const userDiv = document.createElement("div");
    userDiv.innerText = name;

    userDiv.onclick = () => {
      selectedUser = id;
      alert("Selected: " + name);
    };

    div.appendChild(userDiv);
  });
});

// SEND MESSAGE (FIXED)
function sendMessage() {
  const input = document.getElementById("msg");

  if (!input.value.trim()) return; // 🚨 prevents undefined

  socket.emit("chat", {
    user: username,
    text: input.value
  });

  input.value = "";
}

// RECEIVE MESSAGE (FIXED)
socket.on("chat", (msg) => {
  const div = document.getElementById("chat");

  div.innerHTML += `<div><b>${msg.user}:</b> ${msg.text}</div>`;
});

// LIKE
function sendLike() {
  socket.emit("like");
}

socket.on("likes", (count) => {
  document.getElementById("likeCount").innerText = count;
});

// ADMIN
function muteUser() {
  if (!selectedUser) return alert("Select user");
  socket.emit("muteUser", selectedUser);
}

function kickUser() {
  if (!selectedUser) return alert("Select user");
  socket.emit("kickUser", selectedUser);
}
</script>

</body>
</html>
<!-- GIFT PANEL -->
<div>
  <h3>🎁 Gifts</h3>

  <button onclick="sendGift(100)">💎 100</button>
  <button onclick="sendGift(500)">🚀 500</button>
  <button onclick="sendGift(1000)">🔥 1000</button>
</div>

<!-- LIVE GIFT DISPLAY -->
<div id="giftDisplay" style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-size: 24px;
  color: gold;
"></div>
