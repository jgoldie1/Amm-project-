<!DOCTYPE html>
<html>
<head>
  <title>Live Room</title>
  <style>
    body { background: black; color: white; text-align: center; font-family: Arial; }
    #chat { height: 200px; overflow-y: auto; border: 1px solid white; margin: 10px; padding: 5px; }
    button { margin: 5px; padding: 8px; }
    input { padding: 8px; margin: 5px; }
  </style>
</head>
<body>

<h2>🔥 Live Room</h2>

<input id="name" placeholder="Enter username">
<button onclick="join()">Join</button>

<h3>❤️ Likes: <span id="likes">0</span></h3>
<button onclick="like()">Tap ❤️</button>

<div id="chat"></div>

<input id="msg" placeholder="Say something">
<button onclick="send()">Send</button>

<br><br>

<!-- ADMIN CONTROLS -->
<button onclick="muteUser()">Mute (3m)</button>
<button onclick="kickUser()">Kick</button>
<button onclick="reportUser()">Report</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let isMuted = false;
let username = "";

// JOIN
function join() {
  username = document.getElementById("name").value;
  if (!username) return alert("Enter a name");

  socket.emit("join", username);
}

// SEND CHAT
function send() {
  if (isMuted) return alert("You are muted");

  const msg = document.getElementById("msg").value;
  if (!msg) return;

  socket.emit("chat", msg);
  document.getElementById("msg").value = "";
}

// LIKE
function like() {
  socket.emit("like");
}

// ADMIN ACTIONS
function muteUser() {
  const id = prompt("User ID to mute:");
  if (!id) return;
  socket.emit("muteUser", { id, time: 3 });
}

function kickUser() {
  const id = prompt("User ID to kick:");
  if (!id) return;
  socket.emit("kickUser", id);
}

function reportUser() {
  const id = prompt("User ID to report:");
  const reason = prompt("Reason:");
  if (!id || !reason) return;
  socket.emit("reportUser", { id, reason });
}

// RECEIVE CHAT
socket.on("chat", (msg) => {
  const div = document.getElementById("chat");
  div.innerHTML += `<p>${msg}</p>`;
  div.scrollTop = div.scrollHeight;
});

// RECEIVE LIKES
socket.on("likes", (count) => {
  document.getElementById("likes").innerText = count;
});

// MUTED
socket.on("muted", (time) => {
  isMuted = true;
  alert("Muted for " + time + " minutes");
});

// UNMUTED
socket.on("unmuted", () => {
  isMuted = false;
  alert("You are unmuted");
});

// ADMIN
socket.on("admin", () => {
  alert("You are admin 🔥");
});

// REPORT VIEW (admins)
socket.on("report", (data) => {
  console.log("Reports:", data);
});
</script>

</body>
</html>
