<!DOCTYPE html>
<html>
<head>
<title>APP</title>
<style>
body { margin:0; background:black; color:white; font-family:sans-serif; }

/* NAV */
#nav {
  position:fixed; top:0; width:100%;
  background:#111; display:flex; justify-content:space-around;
  padding:10px; z-index:10;
}

/* SECTIONS */
#feed, #live { display:none; margin-top:60px; }
.active { display:block; }

/* FEED */
.videoCard { height:100vh; }
video { width:100%; height:100%; object-fit:cover; }

/* LIVE GRID */
#liveGrid {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:10px;
  padding:10px;
}
.liveBox {
  background:#222;
  height:200px;
}
</style>
</head>

<body>

<!-- NAV -->
<div id="nav">
  <button onclick="showFeed()">🏠 Feed</button>
  <button onclick="showLive()">🔴 Live</button>
  <button onclick="goLive()">🎥 Go Live</button>
</div>

<!-- FEED -->
<div id="feed" class="active"></div>

<!-- LIVE -->
<div id="live">
  <div id="liveGrid">
    <video id="live1" autoplay muted class="liveBox"></video>
    <video id="live2" autoplay class="liveBox"></video>
    <video id="live3" autoplay class="liveBox"></video>
    <video id="live4" autoplay class="liveBox"></video>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

/* SWITCH */
function showFeed(){
  feed.classList.add("active");
  live.classList.remove("active");
}
function showLive(){
  live.classList.add("active");
  feed.classList.remove("active");
}

/* LOAD FEED */
async function loadFeed(){
  const res = await fetch("/feed");
  const data = await res.json();

  feed.innerHTML = "";

  data.forEach(v=>{
    const card = document.createElement("div");
    card.className = "videoCard";

    const vid = document.createElement("video");
    vid.src = v.file;
    vid.autoplay = true;
    vid.loop = true;

    card.appendChild(vid);
    feed.appendChild(card);
  });
}
loadFeed();

/* GO LIVE */
let localStream;

function goLive(){
  showLive();

  navigator.mediaDevices.getUserMedia({video:true,audio:true})
  .then(stream=>{
    localStream = stream;
    live1.srcObject = stream;
  });
}
</script>

</body>
</html>
