<!DOCTYPE html>
<html>
<head>
  <title>Live Chat</title>
  <script src="/socket.io/socket.io.js"></script>
</head>

<body style="background:black;color:white;font-family:sans-serif;">

<h2>💬 Live Chat</h2>

<div id="chat" style="height:250px;overflow:auto;border:1px solid white;padding:10px;"></div>

<br>

<input id="msg" placeholder="Type here..." style="width:70%;padding:10px;">
<button onclick="send()">Send</button>

<script>
const socket = io(window.location.origin);

// username (ALWAYS defined)
let username = prompt("Enter your name:");
if (!username) username = "anon";

// send
function send() {
  const input = document.getElementById("msg");

  const text = input.value ? input.value.trim() : "";
  if (!text) return;

  // 🔥 BUILD STRING HERE (NO OBJECTS EVER)
  const finalMessage = username + ": " + text;

  socket.emit("chat", finalMessage);

  input.value = "";
}

// receive (ONLY STRING)
socket.on("chat", (msg) => {
  if (!msg || typeof msg !== "string") return;

  const div = document.getElementById("chat");

  div.innerHTML += "<div>" + msg + "</div>";
  div.scrollTop = div.scrollHeight;
});
</script>

</body>
</html>
