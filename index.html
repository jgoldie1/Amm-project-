<!DOCTYPE html>
<html>
<head>
  <title>App</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }
  </style>
</head>
<body>

<h2>My App</h2>

<!-- 🎥 VIDEO PLAYER -->
<video width="300" height="500" controls>
  <source src="video.mp4" type="video/mp4">
  Your browser does not support video.
</video>

<br><br>

<!-- ❤️ LIKE BUTTON -->
<button onclick="like()">❤️</button>
<p id="count">0</p>

<script>
let liked = false;
let count = 0;

function like() {
  if (liked) return;
  liked = true;
  count = 1;
  document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
