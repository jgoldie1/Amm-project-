<!DOCTYPE html>
<html>
<head>
  <title>Live Room</title>
  <script src="/socket.io/socket.io.js"></script>
</head>

<body style="background:black;color:white;font-family:sans-serif">

<h2>🔥 LIVE ROOM</h2>

<!-- VIDEO -->
<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas" width="400" height="300" style="border:1px solid white;"></canvas>

<br>

<!-- AUTO + MANUAL FILTERS -->
<button onclick="autoAdjust()">Auto Adjust ⚡</button>

<br><br>

<label>Brightness</label>
<input type="range" id="brightness" min="0.5" max="2" step="0.1" value="1">

<label>Contrast</label>
<input type="range" id="contrast" min="0.5" max="2" step="0.1" value="1">

<label>Saturation</label>
<input type="range" id="saturation" min="0.5" max="2" step="0.1" value="1">

<label>Warmth</label>
<input type="range" id="warmth" min="0" max="40" step="1" value="0">

<br><br>

<!-- CHAT -->
<div id="chat" style="height:150px;overflow:auto;border:1px solid white"></div>
<input id="msg" placeholder="type..." />
<button onclick="sendMessage()">Send</button>

<script>
const socket = io();
let username = prompt("Enter username");
socket.emit("join", username);

// CAMERA + MIC
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

navigator.mediaDevices.getUserMedia({ video: true, audio: true })
.then(stream => {
  video.srcObject = stream;
});

// AUTO ADJUST (SMART LIGHTING)
function autoAdjust() {
  document.getElementById("brightness").value = 1.2;
  document.getElementById("contrast").value = 1.3;
  document.getElementById("saturation").value = 1.2;
  document.getElementById("warmth").value = 15;
}

// DRAW LOOP
function draw() {
  const b = parseFloat(document.getElementById("brightness").value);
  const c = parseFloat(document.getElementById("contrast").value);
  const s = parseFloat(document.getElementById("saturation").value);
  const w = parseFloat(document.getElementById("warmth").value);

  ctx.filter = `
    brightness(${b})
    contrast(${c})
    saturate(${s})
  `;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // ADVANCED COLOR FIX (NO OVER-WHITENING)
  let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let data = frame.data;

  for (let i = 0; i < data.length; i += 4) {

    let r = data[i];
    let g = data[i+1];
    let b = data[i+2];

    // detect bright pixels (like teeth/eyes) → DO NOT boost too much
    let brightness = (r + g + b) / 3;

    if (brightness < 200) {
      // darker tones → enhance gently
      data[i] += w;          // red warmth
      data[i+1] += w * 0.3;  // green slight
      data[i+2] -= w * 0.1;  // reduce blue (prevents washout)
    }

    // clamp values
    data[i] = Math.min(255, data[i]);
    data[i+1] = Math.min(255, data[i+1]);
    data[i+2] = Math.min(255, data[i+2]);
  }

  ctx.putImageData(frame, 0, 0);

  requestAnimationFrame(draw);
}

draw();

// CHAT
function sendMessage() {
  const input = document.getElementById("msg");
  socket.emit("chat", input.value);
  input.value = "";
}

socket.on("chat", (msg) => {
  document.getElementById("chat").innerHTML += `<div>${msg}</div>`;
});
</script>

</body>
</html>
