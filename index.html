<!DOCTYPE html>
<html>
<head>
  <title>Chat FIXED</title>
  <script src="/socket.io/socket.io.js"></script>
</head>

<body style="background:black;color:white;font-size:20px;">

<h1>🔥 CHAT TEST 🔥</h1>

<div id="chat" style="height:200px;border:2px solid white;overflow:auto;"></div>

<br>

<input id="msg" value="hello">
<button onclick="send()">SEND</button>

<script>
// 🔥 FORCE CORRECT CONNECTION
const socket = io(window.location.origin, {
  transports: ["websocket"]
});

// SEND
function send() {
  alert("SENDING"); // must show

  const input = document.getElementById("msg");
  const text = input.value || "fallback";

  socket.emit("chat", text);
}

// RECEIVE
socket.on("chat", (msg) => {
  alert("RECEIVED: " + msg); // must show

  const div = document.getElementById("chat");
  div.innerHTML += "<div>" + msg + "</div>";
});
</script>

</body>
</html>
