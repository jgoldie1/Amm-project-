<!DOCTYPE html>
<html>
<head>
<title>APP</title>
<style>
body { background:black; color:white; font-family:sans-serif; text-align:center; }

/* NAV */
#nav { background:#111; padding:10px; }

/* SECTIONS */
#feed, #account { display:none; }
.active { display:block; }

/* VIDEO */
video { width:100%; max-width:400px; }
</style>
</head>

<body>

<div id="nav">
  <button onclick="showAccount()">Account</button>
  <button onclick="showFeed()">Feed</button>
</div>

<!-- ACCOUNT -->
<div id="account" class="active">
  <h2>Account</h2>

  <input id="user" placeholder="username"><br><br>
  <input id="pass" placeholder="password"><br><br>

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>

  <div id="me"></div>
</div>

<!-- FEED -->
<div id="feed">
  <h2>Users</h2>
  <div id="users"></div>
</div>

<script>
let currentUser = null;

/* NAV */
function showAccount(){
  account.classList.add("active");
  feed.classList.remove("active");
}
function showFeed(){
  feed.classList.add("active");
  account.classList.remove("active");
  loadUsers();
}

/* REGISTER */
async function register(){
  await fetch("/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      username: user.value,
      password: pass.value
    })
  });
  alert("Registered");
}

/* LOGIN */
async function login(){
  const res = await fetch("/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      username: user.value,
      password: pass.value
    })
  });

  const data = await res.json();
  currentUser = data.user;

  if(!currentUser){
    alert("Login failed");
    return;
  }

  me.innerHTML = `
    Logged in: ${currentUser.username}<br>
    Followers: ${currentUser.followers.length}<br>
    Following: ${currentUser.following.length}
  `;
}

/* LOAD USERS */
async function loadUsers(){
  const res = await fetch("/profile/" + currentUser.id);
  const meData = await res.json();

  const resAll = await fetch("/profile/" + currentUser.id);
  const usersDiv = document.getElementById("users");

  usersDiv.innerHTML = `
    <div>
      <b>${meData.username}</b><br>
      Followers: ${meData.followers.length}
    </div>
  `;
}

/* FOLLOW (TEST) */
async function followSelf(){
  await fetch("/follow", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      me: currentUser.id,
      target: currentUser.id
    })
  });

  alert("Followed (test)");
}
</script>

</body>
</html>
