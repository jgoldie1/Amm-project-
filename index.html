<!DOCTYPE html>
<html>
<head>
<title>Live App</title>
<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

/* VIDEO */
video {
  width: 90%;
  max-width: 400px;
  margin-top: 20px;
  border-radius: 10px;
}

/* UI PANEL */
#ui {
  position: fixed;
  right: 10px;
  bottom: 50px;
}

/* BUTTON */
button {
  display: block;
  margin: 10px;
  padding: 15px;
  font-size: 20px;
  border-radius: 50%;
  border: none;
  background: cyan;
  color: black;
  cursor: pointer;
}

/* COUNTER */
#counter {
  font-size: 20px;
}
</style>
</head>

<body>

<h1>LIVE TEST</h1>

<button onclick="startCamera()">🎥 Start Camera</button>

<video id="video" autoplay playsinline muted></video>

<div id="ui">
  <button onclick="sendHeart()">❤️</button>
  <div id="counter">0</div>
</div>

<script>
let hearts = 0;

function sendHeart() {
  hearts++;
  document.getElementById("counter").innerText = hearts;
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: false
    });

    const video = document.getElementById("video");
    video.srcObject = stream;

  } catch (err) {
    alert("Camera error: " + err.message);
  }
}
</script>

</body>
</html>
