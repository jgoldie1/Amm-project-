<!DOCTYPE html>
<html>
<head>
  <title>DEBUG CHAT</title>
  <script src="/socket.io/socket.io.js"></script>
</head>

<body style="background:black;color:white;font-size:20px;">

<h1>DEBUG</h1>

<div id="chat" style="height:200px;border:2px solid white;"></div>

<input id="msg" value="hello">
<button onclick="send()">SEND</button>

<script>
const socket = io();

// SEND
function send() {
  const text = document.getElementById("msg").value;

  alert("SENDING TYPE: " + typeof text);
  socket.emit("chat", text);
}

// RECEIVE
socket.on("chat", (msg) => {

  alert("RECEIVED TYPE: " + typeof msg);

  const div = document.getElementById("chat");

  div.innerHTML += "<div>" + String(msg) + "</div>";
});
</script>

</body>
</html>
