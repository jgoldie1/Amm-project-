<!DOCTYPE html>
<html>
<head>
  <title>Live Room</title>
  <script src="/socket.io/socket.io.js"></script>
</head>

<body style="background:black;color:white;font-family:sans-serif">

<h2>🔥 LIVE ROOM</h2>

<!-- VIDEO (hidden raw feed) -->
<video id="video" autoplay playsinline style="display:none;"></video>

<!-- OUTPUT (filtered) -->
<canvas id="canvas" width="400" height="300" style="border:2px solid white;"></canvas>

<br><br>

<!-- AUTO BUTTON -->
<button onclick="autoAdjust()">⚡ Auto Lighting</button>

<br><br>

<!-- SLIDERS -->
<label>Brightness</label>
<input type="range" id="brightness" min="0.5" max="2" step="0.1" value="1">

<label>Contrast</label>
<input type="range" id="contrast" min="0.5" max="2" step="0.1" value="1">

<label>Saturation</label>
<input type="range" id="saturation" min="0.5" max="2" step="0.1" value="1">

<label>Warmth</label>
<input type="range" id="warmth" min="0" max="40" step="1" value="10">

<br><br>

<!-- CHAT -->
<div id="chat" style="height:150px;overflow:auto;border:1px solid white;padding:5px;"></div>
<input id="msg" placeholder="type..." />
<button onclick="sendMessage()">Send</button>

<script>
const socket = io();

// USER
let username = prompt("Enter username:");
socket.emit("join", username);

// VIDEO SETUP
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// GET CAMERA + MIC
navigator.mediaDevices.getUserMedia({
  video: true,
  audio: true
})
.then(stream => {
  video.srcObject = stream;
})
.catch(err => {
  alert("Camera/Mic error: " + err);
});

// AUTO LIGHTING
function autoAdjust() {
  document.getElementById("brightness").value = 1.2;
  document.getElementById("contrast").value = 1.3;
  document.getElementById("saturation").value = 1.2;
  document.getElementById("warmth").value = 15;
}

// DRAW LOOP (CORE ENGINE)
function draw() {

  let brightness = parseFloat(document.getElementById("brightness").value);
  let contrast = parseFloat(document.getElementById("contrast").value);
  let saturation = parseFloat(document.getElementById("saturation").value);
  let warmth = parseFloat(document.getElementById("warmth").value);

  // BASE FILTER
  ctx.filter = `
    brightness(${brightness})
    contrast(${contrast})
    saturate(${saturation})
  `;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // PIXEL CONTROL (SMART COLOR FIX)
  let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let data = frame.data;

  for (let i = 0; i < data.length; i += 4) {

    let r = data[i];
    let g = data[i + 1];
    let b = data[i + 2];

    let avg = (r + g + b) / 3;

    // ONLY adjust darker/mid tones (prevents white blowout)
    if (avg < 200) {
      data[i] += warmth;          // red boost
      data[i + 1] += warmth * 0.3;
      data[i + 2] -= warmth * 0.1;
    }

    // CLAMP VALUES
    data[i] = Math.min(255, Math.max(0, data[i]));
    data[i + 1] = Math.min(255, Math.max(0, data[i + 1]));
    data[i + 2] = Math.min(255, Math.max(0, data[i + 2]));
  }

  ctx.putImageData(frame, 0, 0);

  requestAnimationFrame(draw);
}

draw();

// CHAT
function sendMessage() {
  const input = document.getElementById("msg");
  if (!input.value) return;

  socket.emit("chat", input.value);
  input.value = "";
}

socket.on("chat", (msg) => {
  const chat = document.getElementById("chat");
  chat.innerHTML += `<div>${msg}</div>`;
  chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
</html>
