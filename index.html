<!DOCTYPE html>
<html>
<head>
  <title>Chat Fixed</title>
  <script src="/socket.io/socket.io.js"></script>
</head>

<body style="background:black;color:white;font-family:sans-serif;">

<h2>💬 Chat</h2>

<div id="chat" style="height:250px;overflow:auto;border:1px solid white;padding:10px;"></div>

<br>

<input id="msg" placeholder="Type message..." style="width:70%;padding:10px;">
<button onclick="send()">Send</button>

<script>
const socket = io(window.location.origin, {
  transports: ["websocket"]
});

// username
let username = prompt("Enter your name:");
if (!username) username = "anon";

socket.emit("join", username);

// send
function send() {
  const input = document.getElementById("msg");

  const text = input.value.trim();
  if (!text) return;

  socket.emit("chat", text);
  input.value = "";
}

// enter key
document.getElementById("msg").addEventListener("keydown", function(e) {
  if (e.key === "Enter") send();
});

// receive
socket.on("chat", (data) => {
  if (!data || !data.text) return;

  const div = document.getElementById("chat");

  const line = document.createElement("div");
  line.innerText = data.user + ": " + data.text;

  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
});
</script>

</body>
</html>
