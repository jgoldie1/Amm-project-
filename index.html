<!DOCTYPE html>
<html>
<head>
<title>PLATFORM</title>
<style>
body { background:black; color:white; font-family:sans-serif; text-align:center; }
.card { background:#222; margin:10px; padding:10px; }
</style>
</head>

<body>

<h2>🔥 PLATFORM</h2>

<input id="user" placeholder="username">
<input id="pass" placeholder="password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<div id="me"></div>

<h3>Create Post</h3>
<input id="postText">
<button onclick="post()">Post</button>

<h3>Feed</h3>
<div id="feed"></div>

<h3>Chat</h3>
<input id="msg">
<button onclick="send()">Send</button>
<div id="chat"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
let meUser=null;
const socket = io();

/* AUTH */
async function register(){
 await fetch("/register",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({username:user.value,password:pass.value})});
 alert("Registered");
}

async function login(){
 const res=await fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({username:user.value,password:pass.value})});
 const data=await res.json();
 meUser=data.user;
 me.innerHTML=`${meUser.username} | Coins: ${meUser.coins}`;
}

/* POST */
async function post(){
 await fetch("/post",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({user:meUser.username,content:postText.value})});
 load();
}

/* FEED */
async function load(){
 const res=await fetch("/feed");
 const data=await res.json();
 feed.innerHTML="";
 data.forEach(p=>{
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`
   <b>${p.user}</b><br>${p.content}<br>
   ❤️ ${p.likes} 👁 ${p.views}<br>
   <button onclick="like(${p.id})">Like</button>
  `;
  div.onclick=()=>view(p.id);
  feed.appendChild(div);
 });
}
load();

async function like(id){
 await fetch("/like",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({id})});
 load();
}

async function view(id){
 await fetch("/view",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({id})});
}

/* CHAT + AI */
function send(){
 socket.emit("chat", msg.value);
 msg.value="";
}

socket.on("chat", m=>{
 const d=document.createElement("div");
 d.innerText=m;
 chat.appendChild(d);
});

/* 🔔 NOTIFICATIONS */
socket.on("notify", n=>{
 alert(n);
});

/* 🎁 GIFT */
socket.on("gift", g=>{
 alert(g);
});
</script>

</body>
</html>
