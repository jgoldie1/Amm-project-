<!DOCTYPE html>
<html>
<head>
  <title>Live Grid Room</title>
  <script src="/socket.io/socket.io.js"></script>
</head>

<body style="background:black;color:white;font-family:sans-serif">

<h2>🔥 LIVE GRID ROOM</h2>

<!-- GRID -->
<div id="grid" style="
display:grid;
grid-template-columns: repeat(3, 1fr);
gap:10px;
"></div>

<script>
const socket = io();
let peers = {};
let localStream;
let myId;
let isHost = false;

// JOIN
let username = prompt("Enter username:");
socket.emit("join", username);

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true, audio: true })
.then(stream => {
  localStream = stream;
});

// USER LIST
socket.on("userList", (list) => {
  myId = socket.id;

  // first user = host
  const firstUser = Object.keys(list)[0];
  isHost = (firstUser === myId);
});

// AUTO CONNECT
socket.on("new-user", (id) => {
  connectToUser(id);
});

// CONNECT
function connectToUser(id) {
  if (peers[id]) return;

  const peer = createPeer(id);
  peers[id] = peer;

  localStream.getTracks().forEach(track => {
    peer.addTrack(track, localStream);
  });
}

// CREATE PEER
function createPeer(id) {
  const peer = new RTCPeerConnection();

  peer.onicecandidate = e => {
    if (e.candidate) {
      socket.emit("signal", {
        to: id,
        signal: { candidate: e.candidate }
      });
    }
  };

  peer.ontrack = e => {
    let box = document.getElementById(id);

    if (!box) {
      box = document.createElement("div");
      box.id = id;
      box.style.position = "relative";

      // VIDEO
      const vid = document.createElement("video");
      vid.autoplay = true;
      vid.style.width = "100%";
      vid.srcObject = e.streams[0];

      // BORDER (HOLOGRAPHIC FLAG STYLE)
      vid.style.border = "4px solid";
      vid.style.borderImage = "linear-gradient(45deg, red, white, blue) 1";

      box.appendChild(vid);

      // HOST BUTTON
      if (isHost) {
        const btn = document.createElement("button");
        btn.innerText = "Kick";
        btn.style.position = "absolute";
        btn.style.top = "5px";
        btn.style.right = "5px";

        btn.onclick = () => {
          socket.emit("kickUser", id);
        };

        box.appendChild(btn);
      }

      document.getElementById("grid").appendChild(box);
    }
  };

  peer.onnegotiationneeded = async () => {
    const offer = await peer.createOffer();
    await peer.setLocalDescription(offer);

    socket.emit("signal", {
      to: id,
      signal: { sdp: peer.localDescription }
    });
  };

  return peer;
}

// RECEIVE SIGNAL
socket.on("signal", async (data) => {
  let peer = peers[data.from];

  if (!peer) {
    peer = createPeer(data.from);
    peers[data.from] = peer;

    localStream.getTracks().forEach(track => {
      peer.addTrack(track, localStream);
    });
  }

  if (data.signal.sdp) {
    await peer.setRemoteDescription(new RTCSessionDescription(data.signal.sdp));

    if (data.signal.sdp.type === "offer") {
      const answer = await peer.createAnswer();
      await peer.setLocalDescription(answer);

      socket.emit("signal", {
        to: data.from,
        signal: { sdp: peer.localDescription }
      });
    }
  }

  if (data.signal.candidate) {
    await peer.addIceCandidate(new RTCIceCandidate(data.signal.candidate));
  }
});

// REMOVE USER
socket.on("user-disconnected", (id) => {
  if (peers[id]) peers[id].close();
  delete peers[id];

  const el = document.getElementById(id);
  if (el) el.remove();
});

// KICKED
socket.on("kicked", () => {
  alert("You were removed by host");
  location.reload();
});

// SPEAKER HIGHLIGHT (ROTATE)
setInterval(() => {
  const vids = document.querySelectorAll("video");
  vids.forEach(v => v.style.boxShadow = "none");

  if (vids.length > 0) {
    const active = vids[Math.floor(Math.random() * vids.length)];
    active.style.boxShadow = "0 0 20px gold";
  }
}, 3000);

</script>

</body>
</html>
