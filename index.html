<!DOCTYPE html>
<html>
<head>
  <title>Video App</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    #feed div {
      scroll-snap-align: start;
      height: 100vh;
    }

    video {
      width: 100%;
      height: 100vh;
      object-fit: cover;
    }
  </style>
</head>
<body>

<h2>Upload Video</h2>
<input type="file" id="upload">
<button onclick="loadVideo()">Upload</button>

<h2>Feed</h2>
<div id="feed"></div>

<h2>Live Stream</h2>
<video id="liveVideo" autoplay muted></video>
<br>
<button onclick="startLive()">Start Live</button>

<script>

// UPLOAD
async function loadVideo() {
  const file = document.getElementById("upload").files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("video", file);

  const res = await fetch("/upload", {
    method: "POST",
    body: formData
  });

  loadFeed();
}

// LOAD FEED
async function loadFeed() {
  const res = await fetch("/videos");
  const videos = await res.json();

  const commentRes = await fetch("/comments");
  const allComments = await commentRes.json();

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  videos.forEach(v => {
    const div = document.createElement("div");

    const vid = document.createElement("video");
    vid.src = v;
    vid.autoplay = true;
    vid.loop = true;
    vid.muted = true;

    const input = document.createElement("input");
    input.placeholder = "Add comment";

    const btn = document.createElement("button");
    btn.innerText = "Post";

    const commentsDiv = document.createElement("div");

    if (allComments[v]) {
      allComments[v].forEach(c => {
        const p = document.createElement("p");
        p.innerText = c;
        commentsDiv.appendChild(p);
      });
    }

    btn.onclick = async () => {
      await fetch("/comment", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          video: v,
          text: input.value
        })
      });

      input.value = "";
      loadFeed();
    };

    div.appendChild(vid);
    div.appendChild(input);
    div.appendChild(btn);
    div.appendChild(commentsDiv);

    feed.appendChild(div);
  });
}

// LIVE CAMERA
async function startLive() {
  const video = document.getElementById("liveVideo");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  video.srcObject = stream;
}

// INIT
window.onload = loadFeed;

</script>

</body>
</html>
