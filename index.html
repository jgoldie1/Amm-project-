<!DOCTYPE html>
<html>
<head>
  <title>Live Room</title>
  <script src="/socket.io/socket.io.js"></script>
</head>

<body style="background:black;color:white;font-family:sans-serif">

<h2>🔥 LIVE AUTO ROOM</h2>

<!-- LOCAL VIDEO -->
<video id="video" autoplay muted playsinline style="display:none;"></video>
<canvas id="canvas" width="300" height="220" style="border:2px solid white;"></canvas>

<h3>📺 Live Users</h3>
<div id="videos" style="display:flex;flex-wrap:wrap;gap:10px;"></div>

<script>
const socket = io();
let peers = {};
let localStream;

// JOIN
let username = prompt("Enter username:");
socket.emit("join", username);

// CAMERA
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

navigator.mediaDevices.getUserMedia({ video: true, audio: true })
.then(stream => {
  localStream = stream;
  video.srcObject = stream;
  draw();
});

// FILTER (AUTO)
function draw() {
  ctx.filter = "brightness(1.2) contrast(1.3) saturate(1.2)";
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  requestAnimationFrame(draw);
}

// AUTO CONNECT WHEN USER JOINS
socket.on("new-user", (id) => {
  connectToUser(id);
});

// CREATE CONNECTION
function connectToUser(id) {
  if (peers[id]) return;

  const peer = createPeer(id);
  peers[id] = peer;

  localStream.getTracks().forEach(track => {
    peer.addTrack(track, localStream);
  });
}

// CREATE PEER
function createPeer(id) {
  const peer = new RTCPeerConnection();

  peer.onicecandidate = event => {
    if (event.candidate) {
      socket.emit("signal", {
        to: id,
        signal: { candidate: event.candidate }
      });
    }
  };

  peer.ontrack = event => {
    let vid = document.getElementById(id);

    if (!vid) {
      vid = document.createElement("video");
      vid.id = id;
      vid.autoplay = true;
      vid.style.width = "200px";
      document.getElementById("videos").appendChild(vid);
    }

    vid.srcObject = event.streams[0];
  };

  peer.onnegotiationneeded = async () => {
    const offer = await peer.createOffer();
    await peer.setLocalDescription(offer);

    socket.emit("signal", {
      to: id,
      signal: { sdp: peer.localDescription }
    });
  };

  return peer;
}

// RECEIVE SIGNAL
socket.on("signal", async (data) => {
  let peer = peers[data.from];

  if (!peer) {
    peer = createPeer(data.from);
    peers[data.from] = peer;

    localStream.getTracks().forEach(track => {
      peer.addTrack(track, localStream);
    });
  }

  if (data.signal.sdp) {
    await peer.setRemoteDescription(new RTCSessionDescription(data.signal.sdp));

    if (data.signal.sdp.type === "offer") {
      const answer = await peer.createAnswer();
      await peer.setLocalDescription(answer);

      socket.emit("signal", {
        to: data.from,
        signal: { sdp: peer.localDescription }
      });
    }
  }

  if (data.signal.candidate) {
    await peer.addIceCandidate(new RTCIceCandidate(data.signal.candidate));
  }
});

// CLEAN UP
socket.on("user-disconnected", (id) => {
  if (peers[id]) peers[id].close();
  delete peers[id];

  const vid = document.getElementById(id);
  if (vid) vid.remove();
});
</script>

</body>
</html>
