<!DOCTYPE html>
<html>
<head>
<title>Live App</title>
<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* VIDEO */
#video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* RIGHT UI */
#ui {
  position: absolute;
  right: 10px;
  bottom: 100px;
  text-align: center;
}

button {
  display: block;
  margin: 10px;
  padding: 15px;
  border-radius: 50%;
  border: none;
  font-size: 20px;
  background: cyan;
  color: black;
}

/* COUNTER */
#counter {
  font-size: 18px;
}

/* COMMENTS */
#comments {
  position: absolute;
  bottom: 80px;
  left: 10px;
  width: 60%;
  max-height: 200px;
  overflow-y: auto;
}

.comment {
  background: rgba(0,0,0,0.5);
  margin: 5px 0;
  padding: 5px;
  border-radius: 5px;
}

/* INPUT */
#chatBox {
  position: absolute;
  bottom: 20px;
  left: 10px;
}

input {
  padding: 10px;
  width: 200px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>

<div id="ui">
  <button onclick="sendHeart()">❤️</button>
  <div id="counter">0</div>
</div>

<div id="comments"></div>

<div id="chatBox">
  <input id="msg" placeholder="Type comment..." />
  <button onclick="sendComment()">Send</button>
</div>

<script>
let hearts = 0;

function sendHeart() {
  hearts++;
  document.getElementById("counter").innerText = hearts;
}

// COMMENTS
function sendComment() {
  const input = document.getElementById("msg");
  const text = input.value;

  if (!text) return;

  const div = document.createElement("div");
  div.className = "comment";
  div.innerText = text;

  document.getElementById("comments").appendChild(div);

  input.value = "";
}

// CAMERA
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: false
    });

    document.getElementById("video").srcObject = stream;

  } catch (err) {
    alert("Camera error: " + err.message);
  }
}

// AUTO START CAMERA
startCamera();
</script>

</body>
</html>
