<!DOCTYPE html>
<html>
<head>
<title>FULL LIVE</title>
</head>

<body style="background:black;color:white;">

<h2>🔥 LIVE APP</h2>

<!-- VIDEO -->
<div style="display:flex;gap:10px;">
  <video id="live1" autoplay muted width="30%"></video>
  <video id="live2" autoplay width="30%"></video>
  <video id="live3" autoplay width="30%"></video>
</div>

<br>

<button onclick="startLive()">🔴 Start</button>
<button onclick="leaveLive()">❌ Leave</button>

<br><br>

<!-- ❤️ HEART -->
<button onclick="like()">❤️</button>
<span id="likes">0</span>

<br><br>

<!-- 💬 CHAT -->
<input id="msg">
<button onclick="sendMsg()">Send</button>
<div id="chat"></div>

<br>

<!-- 🎁 GIFT -->
<button onclick="gift()">🎁 Gift</button>

<br><br>

<!-- 📺 UPLOAD -->
<input type="file" id="file">
<button onclick="upload()">Upload</button>

<div id="feed"></div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
const room = "main";

let localStream;
let peers = {};
let slots = ["live2","live3"];
let likes = 0;

socket.emit("join-room", room);

//////////////////////////////////
// 🎥 VIDEO (KEEP THIS SAME)
//////////////////////////////////
async function startLive() {
  localStream = await navigator.mediaDevices.getUserMedia({
    video:true,audio:true
  });
  live1.srcObject = localStream;
}

socket.on("user-joined", id => {
  createPeer(id, true);
});

function createPeer(id, init) {
  const peer = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  localStream.getTracks().forEach(t => peer.addTrack(t, localStream));

  peer.ontrack = e => {
    const slot = slots.shift();
    if(slot) document.getElementById(slot).srcObject = e.streams[0];
  };

  peer.onicecandidate = e => {
    if(e.candidate){
      socket.emit("signal",{to:id,signal:e.candidate});
    }
  };

  peers[id]=peer;

  if(init){
    peer.createOffer()
      .then(o=>peer.setLocalDescription(o))
      .then(()=>{
        socket.emit("signal",{to:id,signal:peer.localDescription});
      });
  }
}

socket.on("signal", async data=>{
  let peer = peers[data.from];
  if(!peer){
    createPeer(data.from,false);
    peer = peers[data.from];
  }

  if(data.signal.type==="offer"){
    await peer.setRemoteDescription(data.signal);
    const ans = await peer.createAnswer();
    await peer.setLocalDescription(ans);
    socket.emit("signal",{to:data.from,signal:ans});
  }
  else if(data.signal.type==="answer"){
    await peer.setRemoteDescription(data.signal);
  }
  else{
    try{await peer.addIceCandidate(data.signal);}catch{}
  }
});

//////////////////////////////////
// ❤️ HEART SYSTEM
//////////////////////////////////
function like(){
  likes++;
  document.getElementById("likes").innerText = likes;
}

//////////////////////////////////
// 💬 CHAT
//////////////////////////////////
function sendMsg(){
  const text = msg.value;
  socket.emit("chat",{room,text});
  msg.value="";
}

socket.on("chat", data=>{
  const p = document.createElement("p");
  p.innerText = data.text;
  chat.appendChild(p);
});

//////////////////////////////////
// 🎁 GIFT (HOLOGRAPHIC)
//////////////////////////////////
function gift(){
  socket.emit("gift",{room});
}

socket.on("gift", ()=>{
  const g = document.createElement("div");
  g.innerText = "✨🎁✨";
  g.style.position="absolute";
  g.style.left=Math.random()*80+"%";
  g.style.top=Math.random()*80+"%";
  g.style.fontSize="40px";
  document.body.appendChild(g);
  setTimeout(()=>g.remove(),2000);
});

//////////////////////////////////
// 📺 UPLOAD + FEED
//////////////////////////////////
async function upload(){
  const file = document.getElementById("file").files[0];
  const form = new FormData();
  form.append("video", file);

  await fetch("/upload",{method:"POST",body:form});
  loadFeed();
}

async function loadFeed(){
  const res = await fetch("/videos");
  const vids = await res.json();

  feed.innerHTML="";
  vids.forEach(v=>{
    const vid = document.createElement("video");
    vid.src = v;
    vid.controls=true;
    vid.width=200;
    feed.appendChild(vid);
  });
}

loadFeed();

//////////////////////////////////
// ❌ LEAVE
//////////////////////////////////
function leaveLive(){
  Object.values(peers).forEach(p=>p.close());
  if(localStream){
    localStream.getTracks().forEach(t=>t.stop());
  }
  location.reload();
}

</script>

</body>
</html>
