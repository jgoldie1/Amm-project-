<!DOCTYPE html>
<html>
<head>
  <title>Live Chat</title>
  <script src="/socket.io/socket.io.js"></script>
</head>

<body style="background:black;color:white;font-family:sans-serif;">

<h2>💬 Live Chat</h2>

<div id="chat" style="height:250px;overflow:auto;border:1px solid white;padding:10px;"></div>

<br>

<input id="msg" placeholder="Type message..." style="width:70%;padding:10px;">
<button onclick="send()">Send</button>

<script>
const socket = io(window.location.origin, {
  transports: ["websocket"]
});

// ✅ username (SAFE)
let username = prompt("Enter your name:");
if (!username || username === "undefined") {
  username = "anon";
}

socket.emit("join", username);

// send
function send() {
  const input = document.getElementById("msg");

  const text = input.value ? input.value.trim() : "";
  if (!text) return;

  socket.emit("chat", text);
  input.value = "";
}

// ENTER KEY
document.getElementById("msg").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    send();
  }
});

// receive
socket.on("chat", (msg) => {
  if (!msg) return;

  const div = document.getElementById("chat");

  const line = document.createElement("div");
  line.innerText = msg;

  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
});
</script>

</body>
</html>
