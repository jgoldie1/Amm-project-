<!DOCTYPE html>
<html>
<head>
  <title>App</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-200px); opacity: 0; }
    }
  </style>
</head>
<body>

<h2>My App 🔴</h2>

<video id="videoPlayer" width="300" height="500" controls>
  <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<br><br>

<input type="file" id="upload" accept="video/mp4">
<button onclick="loadVideo()">Upload</button>

<br><br>

<button onclick="like()">❤️</button>
<p id="count">0</p>

<button onclick="goLive()">Go Live</button>
<p id="liveStatus">Offline</p>

<br>

<input id="commentInput" placeholder="Comment">
<button onclick="addComment()">Post</button>
<ul id="comments"></ul>

<script>
let liked = false;
let count = 0;
let live = false;
let botRunning = false;

function like() {
  if (liked) return;
  liked = true;
  count = 1;
  document.getElementById("count").innerText = count;

  const heart = document.createElement("div");
  heart.innerText = "❤️";
  heart.style.position = "fixed";
  heart.style.bottom = "20px";
  heart.style.left = "50%";
  heart.style.animation = "floatUp 1s ease-out";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 1000);
}

function loadVideo() {
  const file = document.getElementById("upload").files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const video = document.getElementById("videoPlayer");
  video.src = url;
  video.load();
}

function goLive() {
  live = !live;
  document.getElementById("liveStatus").innerText = live ? "🔴 LIVE" : "Offline";

  if (live && !botRunning) {
    botRunning = true;
    setInterval(() => {
      if (!live) return;
      const msgs = ["🔥 fire", "💯 wow", "👏 nice"];
      const msg = msgs[Math.floor(Math.random() * msgs.length)];
      addToChat("Bot: " + msg);
    }, 3000);
  }
}

function addComment() {
  const input = document.getElementById("commentInput");
  if (!input.value) return;
  addToChat("You: " + input.value);
  input.value = "";
}

function addToChat(msg) {
  const li = document.createElement("li");
  li.innerText = msg;
  document.getElementById("comments").appendChild(li);
}
</script>

</body>
</html>
