<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All American Live</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* HOLOGRAPHIC BACKGROUND */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #001f3f, #000);
  animation: pulse 6s infinite;
  z-index: 0;
}

@keyframes pulse {
  0% { opacity: 0.5; }
  50% { opacity: 1; }
  100% { opacity: 0.5; }
}

/* VIDEO FEED */
#videoFeed {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 1;
}

/* RIGHT SIDE UI (TikTok style) */
#ui {
  position: absolute;
  right: 10px;
  bottom: 50px;
  z-index: 2;
  text-align: center;
}

button {
  display: block;
  margin: 10px 0;
  padding: 12px;
  border-radius: 50%;
  border: none;
  font-size: 20px;
  background: rgba(0,255,255,0.7);
  color: black;
  cursor: pointer;
}

/* HEART COUNTER */
#counter {
  font-size: 20px;
  margin-top: 10px;
}

/* GO LIVE BUTTON */
#goLive {
  position: absolute;
  bottom: 20px;
  left: 20px;
  z-index: 2;
  padding: 15px 25px;
  background: red;
  border-radius: 10px;
  font-size: 18px;
}
</style>
</head>

<body>

<div id="bg"></div>

<video id="videoFeed" autoplay muted></video>

<div id="ui">
  <button onclick="sendHeart()">❤️</button>
  <div id="counter">0</div>
</div>

<button id="goLive" onclick="startLive()">🎥 Go Live</button>

<script>
let hearts = 0;

function sendHeart() {
  hearts++;
  document.getElementById("counter").innerText = hearts;
}

/* CAMERA PREVIEW (STEP 1 BEFORE LIVEKIT) */
async function startLive() {
  const video = document.getElementById("videoFeed");

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });

    video.srcObject = stream;

    alert("Camera started — next step is LiveKit connection");
  } catch (err) {
    alert("Camera access denied");
  }
}
</script>

</body>
</html>
