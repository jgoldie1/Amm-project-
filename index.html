<!DOCTYPE html>
<html>
<head>
  <title>Live Stream</title>
  <script src="https://unpkg.com/livekit-client/dist/livekit-client.umd.min.js"></script>
</head>
<body style="background:black; color:white; text-align:center;">

<h1>GO LIVE</h1>

<button onclick="startLive()" style="padding:15px; font-size:20px;">
  START STREAM
</button>

<br><br>

<video id="video" autoplay playsinline muted style="width:90%; max-width:500px;"></video>

<script>
async function startLive() {
  try {
    console.log("Starting...");

    // ✅ FIX 1: force correct backend URL
    const res = await fetch("https://amm-project-d3zu.onrender.com/get-token?room=test-room&username=user1");

    if (!res.ok) {
      throw new Error("Failed to fetch token");
    }

    const data = await res.json();
    console.log("Token received:", data);

    // ✅ FIX 2: connect to LiveKit
    const room = new LivekitClient.Room();

    await room.connect(data.url, data.token);
    console.log("Connected to LiveKit");

    // ✅ FIX 3: camera + mic permissions
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });

    const video = document.getElementById("video");
    video.srcObject = stream;

    // ✅ FIX 4: publish tracks (IMPORTANT for real streaming)
    const tracks = stream.getTracks();
    for (let track of tracks) {
      await room.localParticipant.publishTrack(
        new LivekitClient.LocalTrackPublication(track)
      );
    }

    console.log("Streaming live ✅");

  } catch (err) {
    console.error("ERROR:", err);
    alert("Error: " + err.message);
  }
}
</script>

</body>
</html>
