<!DOCTYPE html>
<html>
<head>
  <title>Click Test</title>
</head>
<body>

<button onclick="handleClick()">Click</button>
<p id="count">0</p>

<script>
let count = 0;
let clicked = false;

function handleClick() {
  if (clicked) return;
  clicked = true;
  count = 1;
  document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
