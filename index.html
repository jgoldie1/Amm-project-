<!DOCTYPE html>
<html>
<head>
  <title>Video App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      font-family: Arial;
    }

    #feed div {
      scroll-snap-align: start;
      height: 100vh;
      position: relative;
    }

    video {
      width: 100%;
      height: 100vh;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      bottom: 20px;
      left: 10px;
      color: white;
    }

    button {
      margin: 5px;
    }
  </style>
</head>

<body>

<h3>Upload</h3>
<input type="file" id="upload" accept="video/mp4">
<button onclick="loadVideo()">Upload</button>

<h3>Feed</h3>
<div id="feed"></div>

<h3>Live (2 people)</h3>
<video id="live1" autoplay muted width="150"></video>
<video id="live2" autoplay muted width="150"></video>
<br>
<button onclick="startLive()">Start Live</button>

<script>

// upload
async function loadVideo() {
  const file = document.getElementById("upload").files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("video", file);

  await fetch("/upload", {
    method: "POST",
    body: formData
  });

  loadFeed();
}

// load feed
async function loadFeed() {
  const videos = await (await fetch("/videos")).json();
  const allComments = await (await fetch("/comments")).json();
  const allLikes = await (await fetch("/likes")).json();

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  videos.forEach(v => {
    const div = document.createElement("div");

    const vid = document.createElement("video");
    vid.src = v;
    vid.autoplay = true;
    vid.loop = true;
    vid.muted = true;

    const overlay = document.createElement("div");
    overlay.className = "overlay";

    // like button
    const likeBtn = document.createElement("button");
    likeBtn.innerText = "❤️ " + (allLikes[v] || 0);

    likeBtn.onclick = async () => {
      const res = await fetch("/like", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ video: v })
      });
      const data = await res.json();
      likeBtn.innerText = "❤️ " + data.likes;
    };

    // gift button
    const giftBtn = document.createElement("button");
    giftBtn.innerText = "🎁 Gift";

    giftBtn.onclick = () => {
      alert("Gift sent 🎁");
    };

    // comment input
    const input = document.createElement("input");
    input.placeholder = "Comment";

    const postBtn = document.createElement("button");
    postBtn.innerText = "Post";

    const commentsDiv = document.createElement("div");

    if (allComments[v]) {
      allComments[v].forEach(c => {
        const p = document.createElement("p");
        p.innerText = c;
        commentsDiv.appendChild(p);
      });
    }

    postBtn.onclick = async () => {
      await fetch("/comment", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ video: v, text: input.value })
      });

      input.value = "";
      loadFeed();
    };

    overlay.appendChild(likeBtn);
    overlay.appendChild(giftBtn);
    overlay.appendChild(input);
    overlay.appendChild(postBtn);
    overlay.appendChild(commentsDiv);

    div.appendChild(vid);
    div.appendChild(overlay);

    feed.appendChild(div);
  });
}

// live (basic 2 cam UI)
async function startLive() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });

  document.getElementById("live1").srcObject = stream;
  document.getElementById("live2").srcObject = stream; // placeholder for 2nd user
}

window.onload = loadFeed;

</script>

</body>
</html>
