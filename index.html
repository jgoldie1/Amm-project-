<!DOCTYPE html>
<html>
<head>
  <title>App</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    .video {
      width: 300px;
      height: 500px;
      background: #111;
      margin: auto;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .actions {
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h2>My App</h2>

<div class="video">
  <p>🎥 Live Screen (placeholder)</p>
</div>

<div class="actions">
  <button onclick="like()">❤️</button>
  <p id="count">0</p>

  <button onclick="gift()">🎁 Send Gift</button>
  <p id="gift">No gifts yet</p>
</div>

<script>
let liked = false;
let count = 0;

function like() {
  if (liked) return;
  liked = true;
  count = 1;
  document.getElementById("count").innerText = count;
}

function gift() {
  document.getElementById("gift").innerText = "🎁 Gift Sent!";
}
</script>

</body>
</html>
