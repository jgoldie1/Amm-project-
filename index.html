<!DOCTYPE html>
<html>
<head>
  <title>Real Live</title>
</head>

<body style="background:black;color:white;">

<h2>🔴 REAL LIVE (3 USERS)</h2>

<div style="display:flex;gap:10px;">
  <video id="live1" autoplay muted width="30%"></video>
  <video id="live2" autoplay width="30%"></video>
  <video id="live3" autoplay width="30%"></video>
</div>

<br>

<button onclick="startLive()">Start</button>
<button onclick="leaveLive()">Leave</button>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
const room = "main";

let localStream;
let peers = {};
let videoSlots = ["live2", "live3"];

socket.emit("join-room", room);

//////////////////////////////////
// 🎥 START CAMERA
//////////////////////////////////
async function startLive() {
  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  document.getElementById("live1").srcObject = localStream;
}

//////////////////////////////////
// 👥 USER JOINED
//////////////////////////////////
socket.on("user-joined", id => {
  createPeer(id, true);
});

//////////////////////////////////
// 🔗 CREATE PEER CONNECTION
//////////////////////////////////
function createPeer(id, initiator) {

  const peer = new RTCPeerConnection({
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" }
    ]
  });

  localStream.getTracks().forEach(track => {
    peer.addTrack(track, localStream);
  });

  peer.ontrack = event => {
    const videoId = videoSlots.shift();
    if (!videoId) return;

    document.getElementById(videoId).srcObject = event.streams[0];
  };

  peer.onicecandidate = event => {
    if (event.candidate) {
      socket.emit("signal", {
        to: id,
        signal: event.candidate
      });
    }
  };

  peers[id] = peer;

  if (initiator) {
    peer.createOffer()
      .then(offer => peer.setLocalDescription(offer))
      .then(() => {
        socket.emit("signal", {
          to: id,
          signal: peer.localDescription
        });
      });
  }
}

//////////////////////////////////
// 📡 SIGNALING
//////////////////////////////////
socket.on("signal", async data => {

  let peer = peers[data.from];

  if (!peer) {
    createPeer(data.from, false);
    peer = peers[data.from];
  }

  if (data.signal.type === "offer") {
    await peer.setRemoteDescription(data.signal);
    const answer = await peer.createAnswer();
    await peer.setLocalDescription(answer);

    socket.emit("signal", {
      to: data.from,
      signal: answer
    });

  } else if (data.signal.type === "answer") {
    await peer.setRemoteDescription(data.signal);

  } else {
    try {
      await peer.addIceCandidate(data.signal);
    } catch (e) {}
  }
});

//////////////////////////////////
// ❌ USER LEFT
//////////////////////////////////
socket.on("user-left", id => {
  if (peers[id]) {
    peers[id].close();
    delete peers[id];
  }
});

//////////////////////////////////
// 🔌 LEAVE
//////////////////////////////////
function leaveLive() {
  Object.values(peers).forEach(p => p.close());
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
  }
  socket.disconnect();
  location.reload();
}

</script>

</body>
</html>
