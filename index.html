<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>All American Live</title>

<script src="https://unpkg.com/livekit-client/dist/livekit-client.umd.min.js"></script>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

#video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: fixed;
  top: 0;
  left: 0;
}

#ui {
  position: absolute;
  right: 10px;
  bottom: 80px;
  text-align: center;
}

button {
  display: block;
  margin: 10px 0;
  padding: 12px;
  border-radius: 50%;
  border: none;
  font-size: 20px;
  background: rgba(0,255,255,0.7);
}

#counter {
  margin-top: 10px;
}

#commentsBox {
  position: absolute;
  left: 10px;
  bottom: 100px;
  width: 200px;
}

.comment {
  background: rgba(0,0,0,0.5);
  margin: 5px 0;
  padding: 5px;
  border-radius: 5px;
}

#inputArea {
  position: absolute;
  bottom: 10px;
  left: 10px;
}

#msg {
  padding: 10px;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>

<div id="ui">
  <button onclick="sendHeart()">❤️</button>
  <div id="counter">0</div>
</div>

<div id="commentsBox">
  <div id="comments"></div>
</div>

<div id="inputArea">
  <input id="msg" placeholder="Type comment..." />
  <button onclick="sendComment()">Send</button>
</div>

<script>

// ❤️ HEARTS
let hearts = 0;
function sendHeart() {
  hearts++;
  document.getElementById("counter").innerText = hearts;
}

// 💬 COMMENTS (WORKING)
function sendComment() {
  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text) return;

  const div = document.createElement("div");
  div.className = "comment";
  div.innerText = text;

  document.getElementById("comments").appendChild(div);

  input.value = "";
}

// 🎥 CAMERA (LOCKED + FIXED)
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: false
    });

    const video = document.getElementById("video");
    video.srcObject = stream;
    await video.play();

  } catch (err) {
    alert("Camera error: " + err.message);
  }
}

startCamera();

</script>

</body>
</html>
