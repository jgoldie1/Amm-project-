<!DOCTYPE html>
<html>
<head>
<title>HOLO LIVE APP</title>

<script src="https://unpkg.com/livekit-client/dist/livekit-client.umd.min.js"></script>

<style>
body { margin:0; background:black; color:white; font-family:sans-serif; }
#nav { display:flex; justify-content:space-around; background:#111; padding:10px; }
#feed, #live, #profile { display:none; }
.active { display:block; }

.videoCard { height:100vh; position:relative; }
video { width:100%; height:100%; object-fit:cover; }

#users { position:fixed; right:0; top:50px; background:#111; padding:10px; }
</style>
</head>

<body>

<div id="nav">
  <button onclick="show('feed')">🏠 Feed</button>
  <button onclick="show('live')">🔴 Live</button>
  <button onclick="show('profile')">👤 Profile</button>
  <button onclick="goLive()">🎥 Go Live</button>
</div>

<div id="feed" class="active"></div>

<div id="live">
  <div id="liveContainer"></div>
</div>

<div id="profile">
  <h3 id="me"></h3>
</div>

<div id="users"></div>

<script>
let currentUser = prompt("username");

// ===== NAV =====
function show(id){
  feed.classList.remove("active");
  live.classList.remove("active");
  profile.classList.remove("active");
  document.getElementById(id).classList.add("active");
}

// ===== FEED =====
async function loadFeed(){
  const res = await fetch("/feed");
  const data = await res.json();

  feed.innerHTML = "";

  data.forEach(v=>{
    const div = document.createElement("div");
    div.className = "videoCard";

    const vid = document.createElement("video");
    vid.src = v.file;
    vid.controls = true;

    div.appendChild(vid);
    feed.appendChild(div);
  });
}
loadFeed();

// ===== USERS + FOLLOW =====
async function loadUsers(){
  const res = await fetch("/users");
  const users = await res.json();

  usersDiv.innerHTML = "";

  users.forEach(u=>{
    const d = document.createElement("div");
    d.innerHTML = `
      ${u.username}
      <button onclick="follow('${u.username}')">Follow</button>
    `;
    usersDiv.appendChild(d);
  });
}

async function follow(user){
  await fetch("/follow", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ me: currentUser, target: user })
  });
  alert("Followed");
}

loadUsers();

// ===== LIVE (SFU) =====
let room;

async function goLive(){
  show("live");

  const res = await fetch(`/get-token?username=${currentUser}&room=main`);
  const data = await res.json();

  room = await LivekitClient.connect("wss://YOUR_URL", data.token);

  await room.localParticipant.enableCameraAndMicrophone();

  room.localParticipant.videoTracks.forEach(pub=>{
    const vid = pub.track.attach();
    liveContainer.appendChild(vid);
  });

  room.on("trackSubscribed", (track)=>{
    if(track.kind === "video"){
      const vid = track.attach();
      liveContainer.appendChild(vid);
    }
  });
}
</script>

</body>
</html>
