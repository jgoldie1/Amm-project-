<!DOCTYPE html>
<html>
<head>
  <title>TEST CHAT</title>
  <script src="/socket.io/socket.io.js"></script>
</head>

<body style="background:black;color:white;font-size:20px;">

<h1>TEST CHAT</h1>

<div id="chat" style="height:200px;border:2px solid white;"></div>

<br>

<input id="msg" value="test message">
<button onclick="send()">SEND</button>

<script>
const socket = io();

// 🔥 TEST BUTTON CLICK FIRST
function send() {
  alert("BUTTON CLICKED"); // MUST SHOW

  const input = document.getElementById("msg");

  const text = input.value || "fallback";

  socket.emit("chat", text);
}

// 🔥 RECEIVE
socket.on("chat", (msg) => {
  alert("RECEIVED: " + msg); // MUST SHOW

  const div = document.getElementById("chat");
  div.innerHTML += "<div>" + msg + "</div>";
});
</script>

</body>
</html>
