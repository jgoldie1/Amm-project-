<!DOCTYPE html>
<html>
<head>
  <title>Live Chat</title>
  <script src="/socket.io/socket.io.js"></script>
</head>

<body style="background:black;color:white;font-family:sans-serif;">

<h2>💬 Live Chat</h2>

<div id="chat" style="height:250px;overflow:auto;border:1px solid white;padding:10px;"></div>

<br>

<input id="msg" placeholder="Type here..." style="width:70%;padding:10px;">
<button onclick="send()">Send</button>

<script>
const socket = io(window.location.origin);

// username
let username = prompt("Enter your name:") || "anon";
socket.emit("join", username);

// send
function send() {
  const input = document.getElementById("msg");

  const value = (input.value || "").trim();
  if (!value) return;

  socket.emit("chat", value);

  input.value = "";
}

// receive
socket.on("chat", (msg) => {
  if (!msg) return; // 🔥 stops undefined

  const div = document.getElementById("chat");

  div.innerHTML += "<div>" + msg + "</div>";
  div.scrollTop = div.scrollHeight;
});
</script>

</body>
</html>
