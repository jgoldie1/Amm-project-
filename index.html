<!DOCTYPE html>
<html>
<head>
<title>LIVE</title>

<style>
body {margin:0;background:black;color:white;font-family:sans-serif;}

#bg {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  opacity:0.25;
}

#videos {
  display:flex;
  justify-content:center;
  align-items:center;
  height:70vh;
  gap:10px;
}

.video-box {
  width:300px;
  height:400px;
  background:#111;
  border-radius:15px;
  overflow:hidden;
  position:relative;
  box-shadow:0 0 25px purple;
}

.video-box video {
  width:100%;
  height:100%;
  object-fit:cover;
}

.label {
  position:absolute;
  bottom:5px;
  left:10px;
  font-size:12px;
  background:rgba(0,0,0,0.5);
  padding:3px 8px;
  border-radius:5px;
}

#side {
  position:fixed;
  right:10px;
  bottom:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.btn {
  font-size:20px;
  padding:10px;
  border-radius:50%;
}

#chatBox {
  position:fixed;
  bottom:0;
  left:0;
  width:70%;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<video id="bg" autoplay muted loop>
  <source src="https://www.w3schools.com/html/mov_bbb.mp4">
</video>

<!-- VIDEO BOXES -->
<div id="videos">

  <div class="video-box">
    <video id="live1" autoplay muted></video>
    <div class="label">YOU</div>
  </div>

  <div class="video-box">
    <video id="live2" autoplay></video>
    <div class="label">USER 2</div>
  </div>

  <div class="video-box">
    <video id="live3" autoplay></video>
    <div class="label">USER 3</div>
  </div>

</div>

<!-- BUTTONS -->
<div id="side">
  <button class="btn" onclick="startLive()">🔴</button>
  <button class="btn" onclick="like()">❤️</button>
  <button class="btn" onclick="gift()">🎁</button>
</div>

<!-- CHAT -->
<div id="chatBox">
  <div id="chat"></div>
  <input id="msg">
  <button onclick="sendMsg()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const room = "main";

let localStream;
let peers = {};
let slots = ["live2","live3"];

socket.emit("join-room", room);

/* VIDEO */
function createPeer(id, init){
  const peer = new RTCPeerConnection({
    iceServers:[
      {urls:"stun:stun.l.google.com:19302"},
      {
        urls:"turn:openrelay.metered.ca:80",
        username:"openrelayproject",
        credential:"openrelayproject"
      }
    ]
  });

  localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));

  peer.ontrack = e=>{
    const slot = slots.shift();
    if(slot) document.getElementById(slot).srcObject = e.streams[0];
  };

  peer.onicecandidate = e=>{
    if(e.candidate){
      socket.emit("signal",{to:id,signal:e.candidate});
    }
  };

  peers[id]=peer;

  if(init){
    peer.createOffer()
    .then(o=>peer.setLocalDescription(o))
    .then(()=>{
      socket.emit("signal",{to:id,signal:peer.localDescription});
    });
  }
}

async function startLive(){
  localStream = await navigator.mediaDevices.getUserMedia({
    video:true,audio:true
  });
  live1.srcObject = localStream;
}

socket.on("user-joined", id=>{
  createPeer(id,true);
});

socket.on("signal", async data=>{
  let peer = peers[data.from];
  if(!peer){
    createPeer(data.from,false);
    peer = peers[data.from];
  }

  if(data.signal.type==="offer"){
    await peer.setRemoteDescription(data.signal);
    const ans = await peer.createAnswer();
    await peer.setLocalDescription(ans);
    socket.emit("signal",{to:data.from,signal:ans});
  }
  else if(data.signal.type==="answer"){
    await peer.setRemoteDescription(data.signal);
  }
  else{
    try{await peer.addIceCandidate(data.signal);}catch{}
  }
});

/* CHAT */
function sendMsg(){
  socket.emit("chat",{room,text:msg.value});
  msg.value="";
}

socket.on("chat", data=>{
  const p=document.createElement("p");
  p.innerText=data.text;
  chat.appendChild(p);
});

/* HEART */
function like(){
  const h=document.createElement("div");
  h.innerText="❤️";
  h.style.position="absolute";
  h.style.left=Math.random()*90+"%";
  h.style.bottom="0px";

  h.animate([
    {transform:"translateY(0)",opacity:1},
    {transform:"translateY(-300px)",opacity:0}
  ],{duration:2000});

  document.body.appendChild(h);
  setTimeout(()=>h.remove(),2000);
}

/* GIFT */
function gift(){
  socket.emit("gift",{room});
}

socket.on("gift", ()=>{
  const g=document.createElement("div");
  g.innerText="💎✨🎁✨💎";
  g.style.position="absolute";
  g.style.left=Math.random()*80+"%";
  g.style.top="80%";

  g.animate([
    {transform:"translateY(0)",opacity:1},
    {transform:"translateY(-300px)",opacity:0}
  ],{duration:2000});

  document.body.appendChild(g);
  setTimeout(()=>g.remove(),2000);
});
</script>

</body>
</html>
