<!DOCTYPE html>
<html>
<head>
<title>LIVE APP</title>
</head>

<body style="background:black;color:white;text-align:center;">

<h2>🔥 LIVE (3 USERS)</h2>

<!-- VIDEO BOXES -->
<div style="display:flex;justify-content:center;gap:10px;">
  <div><video id="live1" autoplay muted width="200"></video><br>HOST</div>
  <div><video id="live2" autoplay width="200"></video><br>GUEST</div>
  <div><video id="live3" autoplay width="200"></video><br>GUEST</div>
</div>

<br>

<button onclick="startLive()">🔴 Start</button>
<button onclick="leaveLive()">❌ Leave</button>
<button onclick="requestJoin()">🙋 Join Live</button>

<br><br>

<!-- ❤️ LIKE -->
<button onclick="like()">❤️</button>
<span id="likes">0</span>

<br><br>

<!-- 💬 CHAT -->
<input id="msg">
<button onclick="sendMsg()">Send</button>
<div id="chat"></div>

<br>

<!-- 🎁 GIFT -->
<button onclick="gift()">🎁 Gift</button>

<br><br>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const room = "main";

let localStream;
let peers = {};
let slots = ["live2","live3"];
let likes = 0;

socket.emit("join-room", room);

// START CAMERA
async function startLive(){
  localStream = await navigator.mediaDevices.getUserMedia({
    video:true,
    audio:true
  });
  live1.srcObject = localStream;
}

// NEW USER
socket.on("user-joined", id => {
  createPeer(id, true);
});

// CREATE PEER
function createPeer(id, init){
  const peer = new RTCPeerConnection({
    iceServers:[
      { urls:"stun:stun.l.google.com:19302" },
      {
        urls:"turn:openrelay.metered.ca:80",
        username:"openrelayproject",
        credential:"openrelayproject"
      }
    ]
  });

  localStream.getTracks().forEach(t => peer.addTrack(t, localStream));

  peer.ontrack = e => {
    const slot = slots.shift();
    if(slot) document.getElementById(slot).srcObject = e.streams[0];
  };

  peer.onicecandidate = e => {
    if(e.candidate){
      socket.emit("signal",{to:id,signal:e.candidate});
    }
  };

  peers[id] = peer;

  if(init){
    peer.createOffer()
    .then(o=>peer.setLocalDescription(o))
    .then(()=>{
      socket.emit("signal",{to:id,signal:peer.localDescription});
    });
  }
}

// SIGNAL
socket.on("signal", async data=>{
  let peer = peers[data.from];

  if(!peer){
    createPeer(data.from,false);
    peer = peers[data.from];
  }

  if(data.signal.type==="offer"){
    await peer.setRemoteDescription(data.signal);
    const ans = await peer.createAnswer();
    await peer.setLocalDescription(ans);
    socket.emit("signal",{to:data.from,signal:ans});
  }
  else if(data.signal.type==="answer"){
    await peer.setRemoteDescription(data.signal);
  }
  else{
    try{ await peer.addIceCandidate(data.signal); }catch{}
  }
});

// CHAT
function sendMsg(){
  socket.emit("chat",{text:msg.value});
  msg.value="";
}

socket.on("chat", data=>{
  const p = document.createElement("p");
  p.innerText = data.text;
  chat.appendChild(p);
});

// LIKE
function like(){
  socket.emit("like");
}

socket.on("like", ()=>{
  likes++;
  document.getElementById("likes").innerText = likes;
});

// GIFT
function gift(){
  socket.emit("gift");
}

socket.on("gift", ()=>{
  const g = document.createElement("div");
  g.innerText = "✨🎁✨";
  g.style.position="absolute";
  g.style.left=Math.random()*80+"%";
  g.style.top=Math.random()*80+"%";
  g.style.fontSize="40px";
  document.body.appendChild(g);
  setTimeout(()=>g.remove(),2000);
});

// REQUEST JOIN
function requestJoin(){
  socket.emit("request-join", room);
}

socket.on("approved", ()=>{
  startLive();
});

// KICK
socket.on("kicked", ()=>{
  alert("You were kicked");
  location.reload();
});

// LEAVE
function leaveLive(){
  Object.values(peers).forEach(p=>p.close());
  if(localStream){
    localStream.getTracks().forEach(t=>t.stop());
  }
  location.reload();
}
</script>

</body>
</html>
