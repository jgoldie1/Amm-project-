<!DOCTYPE html>
<html>
<head>
  <script src="/socket.io/socket.io.js"></script>
</head>

<body>

<!-- YOUR UI -->
<div id="giftDisplay" style="
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:40px;
  color:gold;
  opacity:0;
"></div>

<button onclick="sendGift(100)">Send 100</button>

<!-- ✅ SCRIPT GOES HERE -->
<script>
const socket = io();
let username = prompt("Enter name");

// SEND GIFT
function sendGift(amount) {
  socket.emit("gift", {
    user: username,
    amount: amount
  });
}

// RECEIVE GIFT + SHOW EFFECT
socket.on("gift", (data) => {
  const box = document.getElementById("giftDisplay");

  box.innerHTML = `🎁 ${data.user} sent ${data.amount}!`;

  box.style.transform = "translate(-50%, -50%) scale(1.5)";
  box.style.opacity = "1";

  setTimeout(() => {
    box.style.transform = "translate(-50%, -50%) scale(1)";
    box.style.opacity = "0";
  }, 2000);
});
</script>

</body>
</html>
