<!DOCTYPE html>
<html>
<head>
  <title>Stable Live Chat</title>
  <script src="/socket.io/socket.io.js"></script>
</head>

<body style="background:black;color:white;font-family:sans-serif;">

<h2>💬 Live Chat (Stable)</h2>

<div id="chatBox" style="height:250px;overflow:auto;border:1px solid white;padding:10px;"></div>

<input id="msg" placeholder="Type message..." style="width:70%;">
<button onclick="sendMessage()">Send</button>

<script>
const socket = io();

// USERNAME
let username = prompt("Enter your name") || "anon";
socket.emit("join", username);

// SEND MESSAGE
function sendMessage() {
  const input = document.getElementById("msg");

  if (!input.value.trim()) return;

  socket.emit("chat", input.value);

  input.value = "";
}

// RECEIVE MESSAGE
socket.on("chat", (data) => {
  if (!data || !data.text) return;

  const box = document.getElementById("chatBox");

  const msg = document.createElement("div");
  msg.innerText = data.user + ": " + data.text;

  box.appendChild(msg);
  box.scrollTop = box.scrollHeight;
});
</script>

</body>
</html>
