<script>
const socket = io({
  transports: ["websocket"], // prevents duplicate polling events
});

let locked = false;

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  document.getElementById("video").srcObject = stream;
});

// SEND CHAT
function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;
  socket.emit("chat", text);
  input.value = "";
}

// ENTER KEY
document.getElementById("msg").addEventListener("keydown", function(e) {
  if (e.key === "Enter") send();
});

// ✅ PREVENT SPAM CLICK
function sendHeart() {
  if (locked) return;
  locked = true;
  socket.emit("heart");
  setTimeout(() => locked = false, 300);
}

function sendGift() {
  if (locked) return;
  locked = true;
  socket.emit("gift");
  setTimeout(() => locked = false, 300);
}

// CHAT
socket.on("chat", function(msg) {
  const div = document.getElementById("chat");
  const line = document.createElement("div");
  line.innerText = msg;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
});

// ✅ SINGLE SOURCE OF TRUTH
socket.on("update", function(data) {
  document.getElementById("hearts").innerText = data.hearts;
  document.getElementById("gifts").innerText = data.gifts;
});

// INIT
socket.on("init", function(data) {
  document.getElementById("hearts").innerText = data.hearts || 0;
  document.getElementById("gifts").innerText = data.gifts || 0;
});
</script>
