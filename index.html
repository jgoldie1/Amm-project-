<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All American App</title>
<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* HOLOGRAPHIC BACKGROUND */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #001f3f, #000);
  animation: pulse 5s infinite;
}

@keyframes pulse {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

/* MAIN UI */
#app {
  position: relative;
  z-index: 2;
  text-align: center;
  top: 30%;
}

button {
  padding: 15px 30px;
  margin: 10px;
  font-size: 18px;
  background: cyan;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#counter {
  font-size: 30px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="app">
  <h1>🔥 All American Live</h1>

  <button onclick="goLive()">🎥 Go Live</button>
  <button onclick="sendHeart()">❤️ Send Heart</button>

  <div id="counter">❤️ 0</div>
</div>

<script>
let hearts = 0;

function goLive() {
  alert("Going Live (next step: connect LiveKit)");
}

function sendHeart() {
  hearts++;
  document.getElementById("counter").innerText = "❤️ " + hearts;
}
</script>

</body>
</html>
