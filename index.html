<!DOCTYPE html>
<html>
<head>
  <title>FINAL CHAT</title>
  <script src="/socket.io/socket.io.js"></script>
</head>

<body style="background:black;color:white;">

<h2>Chat</h2>

<div id="chat" style="height:250px;overflow:auto;border:1px solid white;"></div>

<input id="msg">
<button onclick="send()">Send</button>

<script>
const socket = io();

// SEND
function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text) return;

  socket.emit("chat", text);
  input.value = "";
}

// RECEIVE (🔥 FIXED)
socket.on("chat", (data) => {
  console.log("RECEIVED:", data); // DEBUG

  const div = document.getElementById("chat");
  const line = document.createElement("div");

  if (data && data.user && data.text) {
    line.innerText = data.user + ": " + data.text;
  } else {
    line.innerText = "BAD DATA";
  }

  div.appendChild(line);
});
</script>

</body>
</html>
