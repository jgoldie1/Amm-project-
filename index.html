<!DOCTYPE html>
<html>
<head>
  <title>Live Chat</title>
  <script src="/socket.io/socket.io.js"></script>
</head>

<body style="font-family:sans-serif;background:black;color:white;">

<h2>💬 Live Chat</h2>

<div id="chatBox" style="height:250px;overflow:auto;border:1px solid white;padding:10px;"></div>

<br>

<input id="msg" placeholder="Type here..." style="width:70%;padding:10px;font-size:16px;">
<button onclick="sendMessage()" style="padding:10px;">Send</button>

<script>
const socket = io(window.location.origin);

// confirm connection
socket.on("connect", () => {
  alert("✅ Connected");
});

// auto username
let username = "User" + Math.floor(Math.random()*1000);
socket.emit("join", username);

// send message
function sendMessage() {
  const input = document.getElementById("msg");

  if (!input.value.trim()) return;

  socket.emit("chat", input.value);

  input.value = "";
}

// receive message (🔥 FIXED HERE)
socket.on("chat", (data) => {
  const box = document.getElementById("chatBox");

  const msg = document.createElement("div");
  msg.innerText = data.user + ": " + data.text;

  box.appendChild(msg);
  box.scrollTop = box.scrollHeight;
});
</script>

</body>
</html>
