<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
const room = "main";

let localStream;
let peers = {};

socket.emit("join-room", room);

// START CAMERA
async function startLive() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });

    document.getElementById("live1").srcObject = localStream;

  } catch (err) {
    alert("Camera/Mic error: " + err.message);
  }
}

// USER JOINED
socket.on("user-joined", async id => {
  const peer = createPeer(id);
  peers[id] = peer;

  const offer = await peer.createOffer();
  await peer.setLocalDescription(offer);

  socket.emit("signal", {
    to: id,
    signal: offer
  });
});

// CREATE PEER
function createPeer(id) {
  const peer = new RTCPeerConnection({
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" }
    ]
  });

  if (localStream) {
    localStream.getTracks().forEach(track => {
      peer.addTrack(track, localStream);
    });
  }

  peer.ontrack = event => {
    attachStream(event.streams[0]);
  };

  peer.onicecandidate = event => {
    if (event.candidate) {
      socket.emit("signal", {
        to: id,
        signal: event.candidate
      });
    }
  };

  return peer;
}

// RECEIVE SIGNAL
socket.on("signal", async data => {
  let peer = peers[data.from];

  if (!peer) {
    peer = createPeer(data.from);
    peers[data.from] = peer;
  }

  if (data.signal.type === "offer") {
    await peer.setRemoteDescription(data.signal);

    const answer = await peer.createAnswer();
    await peer.setLocalDescription(answer);

    socket.emit("signal", {
      to: data.from,
      signal: answer
    });

  } else if (data.signal.type === "answer") {
    await peer.setRemoteDescription(data.signal);

  } else if (data.candidate) {
    try {
      await peer.addIceCandidate(data.signal);
    } catch (e) {}
  }
});

// ATTACH VIDEO TO SLOT
function attachStream(stream) {
  const slots = ["live2", "live3"];

  for (let id of slots) {
    const vid = document.getElementById(id);
    if (!vid.srcObject) {
      vid.srcObject = stream;
      return;
    }
  }
}

// USER LEFT
socket.on("user-left", id => {
  if (peers[id]) {
    peers[id].close();
    delete peers[id];
  }

  document.getElementById("live2").srcObject = null;
  document.getElementById("live3").srcObject = null;
});

</script>
