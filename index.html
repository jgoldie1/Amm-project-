<!DOCTYPE html>
<html>
<head>
  <title>Video App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
    }

    video {
      width: 100%;
      height: 60vh;
      object-fit: cover;
    }
  </style>
</head>

<body>

<h3>Upload</h3>
<input type="file" id="upload" accept="video/mp4">
<button onclick="uploadVideo()">Upload</button>

<h3>Feed</h3>
<div id="feed"></div>

<h3>Live</h3>
<video id="live1" autoplay muted></video>
<video id="live2" autoplay muted></video>
<video id="live3" autoplay muted></video>
<br>
<button onclick="startLive()">Start Live</button>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
socket.emit("join-room", "main");

// CAMERA
let localStream;
let peer = new RTCPeerConnection();

async function startLive() {
  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  document.getElementById("live1").srcObject = localStream;
}

// UPLOAD
async function uploadVideo() {
  const file = document.getElementById("upload").files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("video", file);

  await fetch("/upload", {
    method: "POST",
    body: formData
  });

  loadFeed();
}

// LOAD FEED
async function loadFeed() {
  const videos = await (await fetch("/videos")).json();
  const allComments = await (await fetch("/comments")).json();
  const allLikes = await (await fetch("/likes")).json();

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  videos.forEach(v => {
    const div = document.createElement("div");

    const vid = document.createElement("video");
    vid.src = v;
    vid.controls = true;

    const likeBtn = document.createElement("button");
    likeBtn.innerText = "❤️ " + (allLikes[v] || 0);

    likeBtn.onclick = async () => {
      const res = await fetch("/like", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ video: v })
      });
      const data = await res.json();
      likeBtn.innerText = "❤️ " + data.likes;
    };

    const input = document.createElement("input");
    input.placeholder = "comment";

    const post = document.createElement("button");
    post.innerText = "Post";

    const commentsDiv = document.createElement("div");

    if (allComments[v]) {
      allComments[v].forEach(c => {
        const p = document.createElement("p");
        p.innerText = c;
        commentsDiv.appendChild(p);
      });
    }

    post.onclick = async () => {
      await fetch("/comment", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ video: v, text: input.value })
      });

      input.value = "";
      loadFeed();
    };

    div.appendChild(vid);
    div.appendChild(likeBtn);
    div.appendChild(input);
    div.appendChild(post);
    div.appendChild(commentsDiv);

    feed.appendChild(div);
  });
}

window.onload = loadFeed;

</script>

</body>
</html>
