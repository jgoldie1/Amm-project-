<!DOCTYPE html>
<html>
<head>
<title>ALL-IN-ONE LIVE APP</title>

<style>
body { margin:0; background:black; color:white; font-family:sans-serif; }

#nav {
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px;
  z-index:10;
}

#feed, #live {
  display:none;
}

.active { display:block; }

.videoCard {
  height:100vh;
}

video {
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>

<body>

<!-- NAV -->
<div id="nav">
  <button onclick="showFeed()">🏠 Feed</button>
  <button onclick="showLive()">🔴 Live</button>
  <button onclick="goLive()">🎥 Go Live</button>
</div>

<!-- FEED -->
<div id="feed" class="active"></div>

<!-- LIVE -->
<div id="live">
  <h2>🔴 LIVE</h2>
  <video id="live1" autoplay muted></video>
  <video id="live2" autoplay></video>
  <video id="live3" autoplay></video>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// SWITCH UI
function showFeed(){
  feed.classList.add("active");
  live.classList.remove("active");
}

function showLive(){
  live.classList.add("active");
  feed.classList.remove("active");
}

// LOAD FEED
async function loadFeed(){
  const res = await fetch("/feed");
  const data = await res.json();

  feed.innerHTML="";

  data.forEach(v=>{
    const vid = document.createElement("video");
    vid.src = v.file;
    vid.controls = true;

    const div = document.createElement("div");
    div.className="videoCard";
    div.appendChild(vid);

    feed.appendChild(div);
  });
}
loadFeed();

// GO LIVE
let localStream;
function goLive(){
  showLive();

  navigator.mediaDevices.getUserMedia({video:true,audio:true})
  .then(stream=>{
    localStream = stream;
    live1.srcObject = stream;
  });
}
</script>

</body>
</html>
