version: "3.9"
services:
  web:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ..:/app
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aam
      POSTGRES_PASSWORD: aam_password
      POSTGRES_DB: aam_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/schema_live.sql:/docker-entrypoint-initdb.d/schema_live.sql

volumes:
  postgres_data:
