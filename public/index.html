<!DOCTYPE html>
<html>
<head>
  <title>App</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    video {
      margin-top: 10px;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-200px); opacity: 0; }
    }
  </style>
</head>
<body>

<h2>My App</h2>

<!-- 🎥 VIDEO PLAYER -->
<video id="videoPlayer" width="300" height="500" controls>
  <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<br><br>

<!-- 📤 UPLOAD -->
<input type="file" id="upload" accept="video/mp4">
<button onclick="loadVideo()">Upload Video</button>

<br><br>

<!-- ❤️ LIKE -->
<button onclick="like()">❤️</button>
<p id="count">0</p>

<script>
let liked = false;
let count = 0;

function like() {
  if (liked) return;

  liked = true;
  count = 1;
  document.getElementById("count").innerText = count;

  createHeart();
}

function createHeart() {
  const heart = document.createElement("div");
  heart.innerText = "❤️";
  heart.style.position = "fixed";
  heart.style.bottom = "20px";
  heart.style.left = "50%";
  heart.style.fontSize = "30px";
  heart.style.animation = "floatUp 1s ease-out";

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 1000);
}

// 🎥 LOAD UPLOADED VIDEO (no server needed)
function loadVideo() {
  const file = document.getElementById("upload").files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);
  const video = document.getElementById("videoPlayer");

  video.src = url;
  video.load();
}
</script>

</body>
</html>
