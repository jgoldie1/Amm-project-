<script>
const socket = io();

let heartCount = 0;
let lastHeartTime = 0;

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  document.getElementById("video").srcObject = stream;
})
.catch(() => {
  alert("Allow camera");
});

// SEND MESSAGE (FIXES TEXT LOCK)
function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text) return;

  socket.emit("chat", text);

  input.value = "";
  input.focus(); // keeps typing smooth
}

// ENTER KEY FIX
document.getElementById("msg").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});

// HEART FIX (STOPS SPAM)
function sendHeart() {
  const now = Date.now();
  if (now - lastHeartTime < 1000) return; // 1 per second

  lastHeartTime = now;
  socket.emit("heart");
}

// RECEIVE CHAT
socket.on("chat", (msg) => {
  const div = document.getElementById("chat");
  const line = document.createElement("div");
  line.innerText = msg;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
});

// RECEIVE HEART
socket.on("heart", () => {
  heartCount++;
  document.getElementById("hearts").innerText = heartCount;
});
</script>
<button onclick="sendHeart()">❤️</button>
