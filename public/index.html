<!DOCTYPE html>
<html>
<head>
  <title>LIVE APP</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif;">

<h2>🔴 LIVE</h2>

<video id="video" autoplay playsinline width="300" style="border:2px solid white;"></video>

<h3>❤️ <span id="hearts">0</span> | 🎁 <span id="gifts">0</span></h3>

<div id="profile">
  Followers: <span id="followers">0</span>
</div>

<div id="chat" style="height:200px;overflow:auto;border:1px solid white;margin:10px;"></div>

<input id="msg" placeholder="Type..." style="width:60%;">
<button onclick="send()">Send</button>
<button onclick="sendHeart()">❤️</button>
<button onclick="sendGift()">🎁</button>

<div id="fx"></div>

<audio id="giftSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
const socket = io({ transports: ["websocket"] });
let locked = false;

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  document.getElementById("video").srcObject = stream;
});

// SEND CHAT
function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;
  socket.emit("chat", text);
  input.value = "";
}

// ENTER KEY
document.getElementById("msg").addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

// HEART
function sendHeart() {
  if (locked) return;
  locked = true;
  socket.emit("heart");
  setTimeout(() => locked = false, 300);
}

// GIFT
function sendGift() {
  if (locked) return;
  locked = true;
  socket.emit("gift");
  setTimeout(() => locked = false, 300);
}

// CHAT RECEIVE
socket.on("chat", (msg) => {
  const div = document.getElementById("chat");
  const line = document.createElement("div");
  line.innerText = msg;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
});

// 🔥 MAIN UPDATE (single source of truth)
socket.on("update", (data) => {
  document.getElementById("hearts").innerText = data.hearts;
  document.getElementById("gifts").innerText = data.gifts;
});

// INIT
socket.on("init", (data) => {
  document.getElementById("hearts").innerText = data.hearts || 0;
  document.getElementById("gifts").innerText = data.gifts || 0;

  // set followers (random profile)
  const firstUser = Object.values(data.users)[0];
  if (firstUser) {
    document.getElementById("followers").innerText = firstUser.followers;
  }
});

// 🎁 GIFT EFFECT
socket.on("giftFX", () => {
  const fx = document.createElement("div");
  fx.innerText = "🎁💥";
  fx.style.fontSize = "40px";
  fx.style.position = "fixed";
  fx.style.top = "50%";
  fx.style.left = "50%";
  fx.style.transform = "translate(-50%, -50%)";
  document.body.appendChild(fx);

  document.getElementById("giftSound").play();

  setTimeout(() => fx.remove(), 1000);
});
</script>

</body>
</html>
