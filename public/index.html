<script>
const socket = io();

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  document.getElementById("video").srcObject = stream;
});

// SEND CHAT
function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;
  socket.emit("chat", text);
  input.value = "";
}

// ENTER KEY
document.getElementById("msg").addEventListener("keydown", function(e) {
  if (e.key === "Enter") send();
});

// HEART
function sendHeart() {
  socket.emit("heart");
}

// GIFT
function sendGift() {
  socket.emit("gift");
}

// RECEIVE CHAT
socket.on("chat", function(msg) {
  const div = document.getElementById("chat");
  const line = document.createElement("div");
  line.innerText = msg;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
});

// ✅ ONLY DISPLAY SERVER COUNT (NO +1)
socket.on("heart", function(count) {
  document.getElementById("hearts").innerText = count;
});

socket.on("gift", function(count) {
  document.getElementById("gifts").innerText = count;
});

// LOAD CORRECT VALUES
socket.on("init", function(data) {
  document.getElementById("hearts").innerText = data.hearts || 0;
  document.getElementById("gifts").innerText = data.gifts || 0;
});
</script>
