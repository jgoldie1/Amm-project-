<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Live App</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; text-align:center; }
    #video { width:300px; height:200px; background:#000; margin:10px auto; }
    #chat { height:150px; overflow:auto; border:1px solid #444; margin:10px; padding:5px; }
    button { margin:5px; padding:10px; }
  </style>
</head>
<body>

<h2>LIVE</h2>

<video id="video" autoplay muted></video>

<div>
  ❤️ <span id="hearts">0</span>
  🎁 <span id="gifts">0</span>
</div>

<button onclick="sendHeart()">❤️ Heart</button>
<button onclick="sendGift(1)">🎁1</button>
<button onclick="sendGift(10)">🎁10</button>

<div id="chat"></div>

<input id="msg" placeholder="type message">
<button onclick="send()">Send</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// CAMERA
navigator.mediaDevices.getUserMedia({ video:true })
.then(stream => {
  document.getElementById("video").srcObject = stream;
})
.catch(() => {
  console.log("camera blocked");
});

// SEND CHAT
function send(){
  const input = document.getElementById("msg");
  if(!input.value) return;
  socket.emit("chat", input.value);
  input.value = "";
}

// HEART
function sendHeart(){
  socket.emit("heart");
}

// GIFT
function sendGift(n){
  socket.emit("gift", n);
}

// RECEIVE CHAT
socket.on("chat", msg => {
  const div = document.getElementById("chat");
  const line = document.createElement("div");
  line.innerText = msg;
  div.appendChild(line);
});

// UPDATE COUNTS
socket.on("update", data => {
  document.getElementById("hearts").innerText = data.hearts;
  document.getElementById("gifts").innerText = data.gifts;
});
</script>

</body>
</html>
