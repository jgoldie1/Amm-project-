<!DOCTYPE html>
<html>
<head>
<title>Live App</title>
<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
}

/* VIDEO GRID */
#videos {
  display:flex;
  height:70vh;
}
video {
  width:33%;
  object-fit:cover;
  background:black;
}

/* RIGHT SIDE UI */
#side {
  position:fixed;
  right:10px;
  bottom:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
}
.btn {
  background:#111;
  border:none;
  color:white;
  font-size:20px;
  padding:10px;
  border-radius:50%;
}

/* CHAT */
#chatBox {
  position:fixed;
  bottom:0;
  left:0;
  width:70%;
}
#chat {
  max-height:120px;
  overflow:auto;
  font-size:14px;
}
input {
  width:70%;
}

/* HEART FLOAT */
.heart {
  position:absolute;
  bottom:50px;
  font-size:24px;
  animation:float 2s linear;
}
@keyframes float {
  from {transform:translateY(0);}
  to {transform:translateY(-200px);opacity:0;}
}
</style>
</head>

<body>

<div id="videos">
  <video id="live1" autoplay muted></video>
  <video id="live2" autoplay></video>
  <video id="live3" autoplay></video>
</div>

<!-- SIDE CONTROLS -->
<div id="side">
  <button class="btn" onclick="startLive()">🔴</button>
  <button class="btn" onclick="like()">❤️</button>
  <button class="btn" onclick="gift()">🎁</button>
  <button class="btn" onclick="leaveLive()">❌</button>
</div>

<!-- CHAT -->
<div id="chatBox">
  <div id="chat"></div>
  <input id="msg">
  <button onclick="sendMsg()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const room = "main";

let localStream;
let peers = {};
let slots = ["live2","live3"];

socket.emit("join-room", room);

//////////////////////////////////
// VIDEO
//////////////////////////////////
async function startLive(){
  localStream = await navigator.mediaDevices.getUserMedia({
    video:true,audio:true
  });
  live1.srcObject = localStream;
}

socket.on("user-joined", id=>{
  createPeer(id,true);
});

function createPeer(id, init){
  const peer = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));

  peer.ontrack = e=>{
    const slot = slots.shift();
    if(slot) document.getElementById(slot).srcObject = e.streams[0];
  };

  peer.onicecandidate = e=>{
    if(e.candidate){
      socket.emit("signal",{to:id,signal:e.candidate});
    }
  };

  peers[id]=peer;

  if(init){
    peer.createOffer()
    .then(o=>peer.setLocalDescription(o))
    .then(()=>{
      socket.emit("signal",{to:id,signal:peer.localDescription});
    });
  }
}

socket.on("signal", async data=>{
  let peer = peers[data.from];
  if(!peer){
    createPeer(data.from,false);
    peer = peers[data.from];
  }

  if(data.signal.type==="offer"){
    await peer.setRemoteDescription(data.signal);
    const ans = await peer.createAnswer();
    await peer.setLocalDescription(ans);
    socket.emit("signal",{to:data.from,signal:ans});
  }
  else if(data.signal.type==="answer"){
    await peer.setRemoteDescription(data.signal);
  }
  else{
    try{await peer.addIceCandidate(data.signal);}catch{}
  }
});

//////////////////////////////////
// HEART
//////////////////////////////////
function like(){
  const h = document.createElement("div");
  h.innerText="❤️";
  h.className="heart";
  h.style.left=Math.random()*80+"%";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),2000);
}

//////////////////////////////////
// CHAT
//////////////////////////////////
function sendMsg(){
  socket.emit("chat",{room,text:msg.value});
  msg.value="";
}

socket.on("chat", data=>{
  const p = document.createElement("p");
  p.innerText=data.text;
  chat.appendChild(p);
});

//////////////////////////////////
// GIFT
//////////////////////////////////
function gift(){
  socket.emit("gift",{room});
}

socket.on("gift", ()=>{
  const g = document.createElement("div");
  g.innerText="✨🎁✨";
  g.style.position="absolute";
  g.style.left=Math.random()*80+"%";
  g.style.top=Math.random()*70+"%";
  g.style.fontSize="30px";
  document.body.appendChild(g);
  setTimeout(()=>g.remove(),2000);
});

//////////////////////////////////
// LEAVE
//////////////////////////////////
function leaveLive(){
  Object.values(peers).forEach(p=>p.close());
  if(localStream){
    localStream.getTracks().forEach(t=>t.stop());
  }
  location.reload();
}
</script>

</body>
</html>
