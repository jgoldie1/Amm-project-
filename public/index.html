<!DOCTYPE html>
<html>
<head>
  <title>Live App</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif;">

<h2>🔴 LIVE</h2>

<video id="video" autoplay playsinline width="300" style="border:2px solid white;"></video>

<br><br>

<div>
❤️ <span id="hearts">0</span> |
🎁 <span id="gifts">0</span>
</div>

<br>

<div id="chat" style="height:200px;overflow:auto;border:1px solid white;margin:10px;"></div>

<input id="msg" placeholder="Type..." style="width:70%;padding:10px;">
<button onclick="send()">Send</button>
<button onclick="sendHeart()">❤️</button>
<button onclick="sendGift()">🎁</button>

<script>
const socket = io();

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  document.getElementById("video").srcObject = stream;
});

// SEND CHAT
function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;
  socket.emit("chat", text);
  input.value = "";
}

// ENTER KEY
document.getElementById("msg").addEventListener("keydown", function(e) {
  if (e.key === "Enter") send();
});

// HEART
function sendHeart() {
  socket.emit("heart");
}

// GIFT
function sendGift() {
  socket.emit("gift");
}

// RECEIVE CHAT
socket.on("chat", function(msg) {
  const div = document.getElementById("chat");
  const line = document.createElement("div");
  line.innerText = msg;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
});

// ✅ ONLY SERVER CONTROLS COUNT
socket.on("heart", function(count) {
  document.getElementById("hearts").innerText = count;
});

socket.on("gift", function(count) {
  document.getElementById("gifts").innerText = count;
});

// INIT
socket.on("init", function(data) {
  document.getElementById("hearts").innerText = data.hearts || 0;
  document.getElementById("gifts").innerText = data.gifts || 0;
});
</script>

</body>
</html>
