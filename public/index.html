<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const socket = io({ transports: ["websocket"] });

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  document.getElementById("video").srcObject = stream;
});

// CHAT
function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;
  socket.emit("chat", text);
  input.value = "";
}

document.getElementById("msg").addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

// HEART
function sendHeart() {
  socket.emit("heart");
}

// 🎁 GIFTS (buttons use: sendGift(1), sendGift(10), etc)
function sendGift(amount) {
  socket.emit("gift", amount);
}

// RECEIVE CHAT
socket.on("chat", (msg) => {
  const div = document.getElementById("chat");
  const line = document.createElement("div");
  line.innerText = msg;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
});

// ✅ THIS IS THE FIX (matches your server)
socket.on("update", (data) => {
  document.getElementById("hearts").innerText = data.hearts;
  document.getElementById("gifts").innerText = data.gifts;
});

// INIT LOAD
socket.on("init", (data) => {
  document.getElementById("hearts").innerText = data.hearts;
  document.getElementById("gifts").innerText = data.gifts;
});
</script>
❤️ <span id="hearts">0</span>
🎁 <span id="gifts">0</span>

<button onclick="sendHeart()">❤️</button>
<button onclick="sendGift(1)">🎁1</button>
<button onclick="sendGift(10)">🎁10</button>
<button onclick="sendGift(100)">🎁100</button>
