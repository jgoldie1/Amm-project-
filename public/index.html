<!DOCTYPE html>
<html>
<body>

<h1 id="count">0</h1>
<button onclick="increment()">Tap</button>

<script>
async function load() {
  const res = await fetch('/count');
  const data = await res.json();
  document.getElementById('count').innerText = data.count;
}

async function increment() {
  await fetch('/increment'); // 👈 works now (GET)
  load();
}

load();
</script>

</body>
</html>
