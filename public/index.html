<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIVE</title>
<style>
body { background:#111; color:#fff; text-align:center; font-family:Arial; }
#video { width:300px; height:200px; background:#000; }
#chat { height:150px; overflow:auto; border:1px solid #444; margin:10px; }
button { margin:5px; padding:10px; }
</style>
</head>
<body>

<h2>LIVE</h2>

<video id="video" autoplay muted playsinline></video>

<div>
❤️ <span id="hearts">0</span>
🎁 <span id="gifts">0</span>
💰 <span id="coins">0</span>
</div>

<button onclick="sendHeart()">❤️</button>
<button onclick="sendGift(1)">🎁1</button>
<button onclick="sendGift(10)">🎁10</button>

<div id="chat"></div>

<input id="msg">
<button onclick="send()">Send</button>

<!-- SOUND -->
<audio id="pop" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// CAMERA
navigator.mediaDevices.getUserMedia({ video:true })
.then(stream => {
  document.getElementById("video").srcObject = stream;
})
.catch(() => console.log("camera blocked"));

// SEND CHAT
function send(){
  const i = document.getElementById("msg");
  if(!i.value) return;
  socket.emit("chat", i.value);
  i.value="";
}

// HEART
function sendHeart(){
  socket.emit("heart");
}

// GIFT
function sendGift(n){
  socket.emit("gift", n);
}

// RECEIVE CHAT
socket.on("chat", msg => {
  const div = document.getElementById("chat");
  const line = document.createElement("div");
  line.innerText = msg;
  div.appendChild(line);
});

// UPDATE COUNTS + SOUND
socket.on("update", data => {
  if(!data) return;

  document.getElementById("hearts").innerText = data.hearts || 0;
  document.getElementById("gifts").innerText = data.gifts || 0;
  document.getElementById("coins").innerText = data.coins || 0;

  // play sound
  document.getElementById("pop").play();
});

// DEBUG
socket.on("connect", () => console.log("CONNECTED"));
</script>

</body>
</html>
