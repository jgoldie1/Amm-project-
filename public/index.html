<script>
const socket = io();

let heartCount = 0;
let giftCount = 0;

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  document.getElementById("video").srcObject = stream;
})
.catch(() => {});

// SEND MESSAGE
function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  socket.emit("chat", text);
  input.value = "";
  input.focus();
}

// ENTER KEY
document.getElementById("msg").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});

// ❤️ HEART (ONLY SEND ON CLICK)
function sendHeart() {
  socket.emit("heart");
}

// 🎁 GIFT (ONLY SEND ON CLICK)
function sendGift() {
  socket.emit("gift");
}

// ✅ RECEIVE HEART (COUNT ONLY HERE)
socket.on("heart", () => {
  heartCount = heartCount + 1;
  document.getElementById("hearts").innerText = heartCount;

  // floating heart
  const h = document.createElement("div");
  h.innerText = "❤️";
  h.style.position = "fixed";
  h.style.bottom = "0px";
  h.style.right = "20px";
  h.style.fontSize = "24px";

  document.body.appendChild(h);

  let y = 0;
  const up = setInterval(() => {
    y += 3;
    h.style.bottom = y + "px";
    h.style.opacity = 1 - y / 200;

    if (y > 200) {
      clearInterval(up);
      h.remove();
    }
  }, 20);
});

// ✅ RECEIVE GIFT (COUNT ONLY HERE)
socket.on("gift", () => {
  giftCount = giftCount + 1;
  document.getElementById("gifts").innerText = giftCount;

  // gift pop
  const g = document.createElement("div");
  g.innerText = "🎁";
  g.style.position = "fixed";
  g.style.top = "50%";
  g.style.left = "50%";
  g.style.transform = "translate(-50%, -50%)";
  g.style.fontSize = "50px";

  document.body.appendChild(g);
  setTimeout(() => g.remove(), 800);
});

// CHAT
socket.on("chat", (msg) => {
  const div = document.getElementById("chat");

  const line = document.createElement("div");
  line.innerText = msg;
  div.appendChild(line);

  div.scrollTop = div.scrollHeight;
});
</script>
