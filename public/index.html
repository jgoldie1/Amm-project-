<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIVE</title>
<style>
body { background:#111; color:#fff; text-align:center; font-family:Arial; }
#video { width:300px; height:200px; background:#000; }
#chat { height:150px; overflow:auto; border:1px solid #444; margin:10px; }
button { margin:5px; padding:10px; }
</style>
</head>
<body>

<h2>LIVE</h2>

<video id="video" autoplay muted playsinline></video>

<div>
❤️ <span id="hearts">0</span>
🎁 <span id="gifts">0</span>
💰 <span id="coins">0</span>
</div>

<button onclick="sendHeart()">❤️</button>
<button onclick="sendGift(1)">🎁1</button>
<button onclick="sendGift(10)">🎁10</button>

<div id="chat"></div>

<input id="msg" placeholder="type message">
<button onclick="send()">Send</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// CAMERA (FIXED)
navigator.mediaDevices.getUserMedia({ video:true })
.then(stream => {
  const vid = document.getElementById("video");
  if (vid) vid.srcObject = stream;
})
.catch(err => console.log("camera blocked", err));

// SEND CHAT
function send(){
  const i = document.getElementById("msg");
  if(!i.value) return;
  socket.emit("chat", i.value);
  i.value="";
}

// HEART
function sendHeart(){
  socket.emit("heart");
}

// GIFT
function sendGift(n){
  socket.emit("gift", n);
}

// RECEIVE CHAT
socket.on("chat", msg => {
  const div = document.getElementById("chat");
  if(!div) return;

  const line = document.createElement("div");
  line.innerText = msg || "";
  div.appendChild(line);
});

// UPDATE (FIXED)
socket.on("update", data => {
  if(!data) return;

  document.getElementById("hearts").innerText = data.hearts ?? 0;
  document.getElementById("gifts").innerText = data.gifts ?? 0;
  document.getElementById("coins").innerText = data.coins ?? 0;
});

// DEBUG (CHECK CONNECTION)
socket.on("connect", () => {
  console.log("CONNECTED");
});
</script>

</body>
</html>
