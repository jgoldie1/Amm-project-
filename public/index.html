<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io({ transports: ["websocket"] });

// ✅ FIX CAMERA (your ID is "cam", NOT "video")
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  const cam = document.getElementById("cam");
  if (cam) cam.srcObject = stream;
})
.catch(() => console.log("camera blocked"));

// ✅ FIX INPUT IDS (you changed them earlier)
const chatForm = document.getElementById("chat-form");
const chatInput = document.getElementById("chat-input");
const chatBox = document.getElementById("chat-messages");

// SEND CHAT
chatForm.onsubmit = (e) => {
  e.preventDefault();
  const text = chatInput.value.trim();
  if (!text) return;
  socket.emit("chat", text);
  chatInput.value = "";
};

// RECEIVE CHAT
socket.on("chat", (data) => {
  const div = document.createElement("div");
  div.innerText = data.user + ": " + data.msg;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
});

// HEART BUTTON
document.getElementById("heart-btn").onclick = () => {
  socket.emit("heart");
};

// GIFT BUTTONS
document.querySelectorAll("[data-amount]").forEach(btn => {
  btn.onclick = () => {
    socket.emit("gift", parseInt(btn.dataset.amount));
  };
});

// COUNTERS (THIS WAS YOUR MAIN BUG BEFORE)
socket.on("update", (data) => {
  document.getElementById("hearts").innerText = data.hearts;
  document.getElementById("gifts").innerText = data.gifts;
});

// INIT LOAD
socket.on("init", (data) => {
  document.getElementById("hearts").innerText = data.hearts;
  document.getElementById("gifts").innerText = data.gifts;
});
</script>
