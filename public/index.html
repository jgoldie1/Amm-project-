<!DOCTYPE html>
<html>
<head>
  <title>Live App</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif;">

<h2>LIVE</h2>

<video id="cam" autoplay playsinline width="300" style="border:2px solid white;"></video>

<br><br>

<div>
❤️ <span id="hearts">0</span> |
🎁 <span id="gifts">0</span>
</div>

<br>

<div id="chat" style="height:200px;overflow:auto;border:1px solid white;margin:10px;"></div>

<input id="msg" placeholder="Type..." style="width:70%;padding:10px;">
<button onclick="send()">Send</button>
<button onclick="heart()">❤️</button>
<button onclick="gift()">🎁</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  document.getElementById("cam").srcObject = stream;
})
.catch(() => console.log("camera blocked"));

// CHAT SEND
function send() {
  const input = document.getElementById("msg");
  if (!input.value) return;
  socket.emit("chat", input.value);
  input.value = "";
}

// HEART
function heart() {
  socket.emit("heart");
}

// GIFT
function gift() {
  socket.emit("gift", 1);
}

// RECEIVE CHAT
socket.on("chat", (msg) => {
  const div = document.getElementById("chat");
  const line = document.createElement("div");
  line.innerText = msg.user + ": " + msg.msg;
  div.appendChild(line);
});

// COUNTERS
socket.on("update", (data) => {
  document.getElementById("hearts").innerText = data.hearts;
  document.getElementById("gifts").innerText = data.gifts;
});

socket.on("init", (data) => {
  document.getElementById("hearts").innerText = data.hearts;
  document.getElementById("gifts").innerText = data.gifts;
});
</script>

</body>
</html>
