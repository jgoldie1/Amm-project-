<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIVE</title>

<style>
body { background:#111; color:#fff; text-align:center; }

#video {
  width:300px;
  height:200px;
  background:#000;
  pointer-events:none; /* 🔥 FIX: camera no longer blocks clicks */
}

#chat {
  height:150px;
  overflow:auto;
  border:1px solid #444;
  margin:10px;
}

button { padding:10px; margin:5px; }

@keyframes up {
  from { transform:translateY(0); opacity:1; }
  to { transform:translateY(-200px); opacity:0; }
}
</style>
</head>

<body>

<h2>LIVE</h2>

<video id="video" autoplay muted playsinline></video>

<div>
❤️ <span id="hearts">0</span>
🎁 <span id="gifts">0</span>
💰 <span id="coins">0</span>
</div>

<button onclick="tap()">❤️ TAP</button>
<button onclick="gift(1)">🎁1</button>
<button onclick="gift(10)">🎁10</button>

<div id="chat"></div>

<input id="msg">
<button onclick="send()">Send</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// CAMERA
navigator.mediaDevices.getUserMedia({ video:true })
.then(s => {
  video.srcObject = s;
  video.play();
}).catch(()=>{});

// FIRST CLICK ENABLES SOUND
let soundReady = false;
document.body.addEventListener("click", () => {
  soundReady = true;
});

// SEND CHAT
function send(){
  if(!msg.value) return;
  socket.emit("chat", msg.value);
  msg.value="";
}

// BUTTONS
function tap(){ socket.emit("heart"); }
function gift(n){ socket.emit("gift", n); }

// INIT
socket.on("init", d=>{
  hearts.innerText = d.hearts||0;
  gifts.innerText = d.gifts||0;
  coins.innerText = d.coins||0;
});

// UPDATE
socket.on("update", d=>{
  hearts.innerText = d.hearts||0;
  gifts.innerText = d.gifts||0;
  coins.innerText = d.coins||0;
});

// CHAT FIX (NO UNDEFINED EVER)
socket.on("chat", d=>{
  if(!d || !d.text) return;

  const line = document.createElement("div");
  line.innerText = d.text;
  chat.appendChild(line);
  chat.scrollTop = chat.scrollHeight;
});

// SOUND
function play(type){
  if(!soundReady) return;

  let url = type==="gift"
    ? "https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
    : "https://actions.google.com/sounds/v1/cartoon/pop.ogg";

  new Audio(url).play().catch(()=>{});
}

// FX
socket.on("fx", d=>{
  play(d.type);

  let power = d.type==="gift" ? 15 : 5;

  for(let i=0;i<power;i++){
    const el = document.createElement("div");
    el.innerText = d.type==="gift" ? "💰💥" : "❤️";
    el.style.position="fixed";
    el.style.bottom="0";
    el.style.left=Math.random()*100+"%";
    el.style.animation="up 1s linear";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
  }
});
</script>

</body>
</html>
