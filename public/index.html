<div>
❤️ <span id="hearts">0</span>
🎁 <span id="gifts">0</span>
💰 <span id="coins">0</span>
</div>

<button onclick="sendHeart()">❤️</button>
<button onclick="sendGift(1)">🎁1</button>
<button onclick="sendGift(10)">🎁10</button>

<div id="chat"></div>

<input id="msg" placeholder="type message">
<button onclick="send()">Send</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// SEND CHAT
function send(){
  const i = document.getElementById("msg");
  if(!i.value) return;
  socket.emit("chat", i.value);
  i.value="";
}

// HEART
function sendHeart(){
  socket.emit("heart");
}

// GIFT
function sendGift(n){
  socket.emit("gift", n);
}

// RECEIVE CHAT
socket.on("chat", msg => {
  const div = document.getElementById("chat");
  const line = document.createElement("div");
  line.innerText = msg;
  div.appendChild(line);
});

// UPDATE COUNTS (THIS FIXES YOUR PROBLEM)
socket.on("update", data => {
  document.getElementById("hearts").innerText = data.hearts || 0;
  document.getElementById("gifts").innerText = data.gifts || 0;
  document.getElementById("coins").innerText = data.coins || 0;
});

// EXPLOSION TEST (you’ll see in console)
socket.on("boom", n => {
  console.log("boom", n);
});
</script>
