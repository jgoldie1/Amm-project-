<script>
const socket = io({ transports:["websocket"] });

let lock=false;
let combo=0;

// 🔊 SOUND
function play(type){
  new Audio("/sounds/"+type+".mp3").play().catch(()=>{});
}

// ❤️ HEART
function sendHeart(){
  if(lock) return;
  lock=true;
  socket.emit("heart");
  play("heart");
  float("❤️");
  setTimeout(()=>lock=false,200);
}

// 🎁 GIFT
function sendGift(){
  if(lock) return;
  lock=true;
  combo++;
  socket.emit("gift");
  play("gift");
  explode();
  setTimeout(()=>lock=false,200);
}

// ✨ FLOAT
function float(txt){
  let el=document.createElement("div");
  el.innerText=txt;
  el.style.position="fixed";
  el.style.bottom="0";
  el.style.left=Math.random()*90+"%";
  el.style.fontSize="24px";
  el.style.animation="float 2s linear";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2000);
}

// 💥 BIG EXPLOSION
function explode(){
  for(let i=0;i<10;i++){
    let el=document.createElement("div");
    el.innerText="🎁";
    el.style.position="fixed";
    el.style.left="50%";
    el.style.top="50%";
    el.style.fontSize=(20+Math.random()*40)+"px";
    el.style.transform=`translate(-50%,-50%) rotate(${Math.random()*360}deg)`;
    el.style.animation="explode 1s ease-out";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
  }
}

// 👤 PROFILE
function setName(){
  let name=document.getElementById("username").value;
  localStorage.setItem("user", name);
}

// 💬 CHAT
function send(){
  let u=localStorage.getItem("user")||"anon";
  let m=document.getElementById("msg");
  if(!m.value.trim()) return;
  socket.emit("chat", u+": "+m.value);
  m.value="";
}

// SOCKET
socket.on("chat", m=>{
  let d=document.getElementById("chat");
  let l=document.createElement("div");
  l.innerText=m;
  d.appendChild(l);
  d.scrollTop=d.scrollHeight;
});

socket.on("update", d=>{
  hearts.innerText=d.hearts;
  gifts.innerText=d.gifts;
});

socket.on("init", d=>{
  hearts.innerText=d.hearts||0;
  gifts.innerText=d.gifts||0;
});

socket.on("explode", explode);
</script>
