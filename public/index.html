<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIVE</title>
</head>
<body style="background:#111;color:#fff;text-align:center;">

<h2>LIVE TEST</h2>

<div>
❤️ <span id="hearts">0</span>
🎁 <span id="gifts">0</span>
💰 <span id="coins">0</span>
</div>

<button onclick="sendHeart()">❤️</button>
<button onclick="sendGift(1)">🎁1</button>

<div id="chat"></div>

<input id="msg">
<button onclick="send()">Send</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io(); // NO options (important test)

console.log("START");

// CONNECTION TEST
socket.on("connect", () => {
  console.log("✅ CONNECTED TO SERVER");
});

// RECEIVE CHAT
socket.on("chat", msg => {
  console.log("CHAT:", msg);

  const div = document.getElementById("chat");
  const line = document.createElement("div");
  line.innerText = msg;
  div.appendChild(line);
});

// UPDATE COUNTS
socket.on("update", data => {
  console.log("UPDATE:", data);

  document.getElementById("hearts").innerText = data.hearts;
  document.getElementById("gifts").innerText = data.gifts;
  document.getElementById("coins").innerText = data.coins;
});

// SEND
function send(){
  const i = document.getElementById("msg");
  socket.emit("chat", i.value);
  i.value="";
}

function sendHeart(){
  socket.emit("heart");
}

function sendGift(n){
  socket.emit("gift", n);
}
</script>

</body>
</html>
