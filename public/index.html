<!DOCTYPE html>
<html>
<head>
  <title>LIVE</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif;">

<h2>🔴 LIVE</h2>

<video id="video" autoplay playsinline width="300"></video>

<div>
❤️ <span id="hearts">0</span> | 🎁 <span id="gifts">0</span>
</div>

<div id="chat" style="height:150px;overflow:auto;border:1px solid white;margin:10px;"></div>

<input id="msg">
<button onclick="send()">Send</button>
<button onclick="sendHeart()">❤️</button>
<button onclick="sendGift()">🎁</button>

<script>
const socket = io();

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(s => video.srcObject = s)
.catch(() => {});

// INIT COUNTS
socket.on("init", (data) => {
  document.getElementById("hearts").innerText = data.hearts;
  document.getElementById("gifts").innerText = data.gifts;
});

// SEND CHAT
function send() {
  const text = msg.value.trim();
  if (!text) return;

  socket.emit("chat", text);
  msg.value = "";
}

// HEART
function sendHeart() {
  socket.emit("heart");
}

// GIFT
function sendGift() {
  socket.emit("gift");
}

// RECEIVE HEART
socket.on("heart", (count) => {
  document.getElementById("hearts").innerText = count;
});

// RECEIVE GIFT
socket.on("gift", (count) => {
  document.getElementById("gifts").innerText = count;
});

// CHAT
socket.on("chat", (text) => {
  const d = document.createElement("div");
  d.innerText = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
</html>
