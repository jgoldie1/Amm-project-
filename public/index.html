<script>
const socket = io();

let hearts = 0;
let gifts = 0;

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(s => video.srcObject = s)
.catch(() => {});

// CHAT SEND
function send() {
  const text = msg.value.trim();
  if (!text) return;

  socket.emit("chat", text);
  addChat("You: " + text);

  msg.value = "";
}

// ENTER KEY
msg.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});

// ❤️ CLICK (LOCAL ONLY ONCE)
function sendHeart() {
  socket.emit("heart");
}

// 🎁 CLICK
function sendGift() {
  socket.emit("gift");
}

// 🔥 RECEIVE HEART (ONLY PLACE COUNT HAPPENS)
socket.on("heart", () => {
  hearts++;
  document.getElementById("hearts").innerText = hearts;
  createHeart();
});

// 🔥 RECEIVE GIFT
socket.on("gift", () => {
  gifts++;
  document.getElementById("gifts").innerText = gifts;
  createGift();
});

// CHAT RECEIVE
socket.on("chat", (text) => {
  addChat("User: " + text);

  // 🤖 BOT (NO LOOP)
  if (text.toLowerCase() === "hi") {
    setTimeout(() => {
      addChat("🤖 bot: hello");
    }, 500);
  }
});

// UI
function addChat(t) {
  const d = document.createElement("div");
  d.innerText = t;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function createHeart() {
  const h = document.createElement("div");
  h.innerText = "❤️";
  h.style.position = "fixed";
  h.style.right = "20px";
  h.style.bottom = "0px";
  h.style.fontSize = "24px";

  document.body.appendChild(h);

  let y = 0;
  const i = setInterval(() => {
    y += 3;
    h.style.bottom = y + "px";
    h.style.opacity = 1 - y / 200;

    if (y > 200) {
      clearInterval(i);
      h.remove();
    }
  }, 20);
}

function createGift() {
  const g = document.createElement("div");
  g.innerText = "🎁";
  g.style.position = "fixed";
  g.style.top = "50%";
  g.style.left = "50%";
  g.style.transform = "translate(-50%, -50%)";
  g.style.fontSize = "60px";

  document.body.appendChild(g);
  setTimeout(() => g.remove(), 800);
}
</script>
