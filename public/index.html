<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIVE</title>
</head>

<body style="background:#111;color:#fff;text-align:center;">

<h2>LIVE</h2>

<video id="video" autoplay muted playsinline width="300"></video>

<div>
❤️ <span id="hearts">0</span>
🎁 <span id="gifts">0</span>
💰 <span id="coins">0</span>
</div>

<button onclick="tap()">🔥 TAP</button>
<button onclick="sendHeart()">❤️</button>
<button onclick="sendGift(1)">🎁1</button>

<br><br>

<input id="msg">
<button onclick="send()">Send</button>

<div id="chat"></div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// ===== CAMERA =====
navigator.mediaDevices.getUserMedia({ video:true })
.then(stream => {
  document.getElementById("video").srcObject = stream;
})
.catch(err => console.log("camera error", err));

// ===== SEND CHAT =====
function send(){
  const i = document.getElementById("msg");
  if (!i.value) return;
  socket.emit("chat", i.value);
  i.value = "";
}

// ===== TAP =====
function tap(){
  console.log("tap click");
  socket.emit("heart");
}

// ===== HEART =====
function sendHeart(){
  console.log("heart click");
  socket.emit("heart");
}

// ===== GIFT =====
function sendGift(n){
  console.log("gift click", n);
  socket.emit("gift", n);
}

// ===== RECEIVE CHAT =====
socket.on("chat", msg => {
  console.log("chat received:", msg);

  const div = document.getElementById("chat");
  const line = document.createElement("div");
  line.innerText = msg;
  div.appendChild(line);
});

// ===== UPDATE =====
socket.on("update", data => {
  console.log("update:", data);

  document.getElementById("hearts").innerText = data.hearts;
  document.getElementById("gifts").innerText = data.gifts;
  document.getElementById("coins").innerText = data.coins;

  const s = document.getElementById("sound");
  s.play().catch(()=>{});
});

// ===== CONNECT =====
socket.on("connect", () => {
  console.log("CONNECTED TO SERVER");
});
</script>

</body>
</html>
