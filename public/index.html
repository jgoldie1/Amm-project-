<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIVE</title>

<style>
body { background:#111; color:#fff; text-align:center; font-family:Arial; }
#video { width:300px; height:200px; background:#000; margin:10px auto; }
#chat { height:150px; overflow:auto; border:1px solid #444; margin:10px; padding:5px; }

@keyframes up {
  from { transform:translateY(0); opacity:1; }
  to { transform:translateY(-200px); opacity:0; }
}
</style>
</head>

<body>

<h2>LIVE</h2>

<video id="video" autoplay muted playsinline></video>

<div>
❤️ <span id="hearts">0</span>
🎁 <span id="gifts">0</span>
💰 <span id="coins">0</span>
</div>

<button onclick="heart()">❤️ Tap</button>
<button onclick="gift(1)">🎁1</button>
<button onclick="gift(10)">🎁10</button>

<div id="chat"></div>

<input id="msg">
<button onclick="send()">Send</button>

<audio id="sound-heart" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>
<audio id="sound-gift" src="https://www.soundjay.com/explosion/sounds/explosion-01.mp3"></audio>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// CAMERA
navigator.mediaDevices.getUserMedia({ video:true })
.then(stream => video.srcObject = stream)
.catch(() => console.log("camera blocked"));

// SEND
function send(){
  const m = msg.value;
  if(!m) return;
  socket.emit("chat", m);
  msg.value="";
}

function heart(){
  socket.emit("heart");
}

function gift(n){
  socket.emit("gift", n);
}

// INIT
socket.on("init", d => {
  hearts.innerText = d.hearts;
  gifts.innerText = d.gifts;
  coins.innerText = d.coins;
});

// UPDATE
socket.on("update", d => {
  hearts.innerText = d.hearts;
  gifts.innerText = d.gifts;
  coins.innerText = d.coins;
});

// CHAT
socket.on("chat", m => {
  const line = document.createElement("div");
  line.innerText = m;
  chat.appendChild(line);
});

// FX
socket.on("fx", d => {
  let count = 5;
  if (d.power > 50) count = 10;
  if (d.power > 200) count = 20;
  if (d.power > 500) count = 30;

  for(let i=0;i<count;i++){
    const el = document.createElement("div");
    el.innerText = d.type==="gift" ? "💥💰" : "❤️";

    el.style.position="fixed";
    el.style.bottom="0";
    el.style.left=Math.random()*100+"%";
    el.style.animation="up 1s linear";

    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
  }
});

// SOUND
socket.on("sound", t => {
  if(t==="heart") document.getElementById("sound-heart").play();
  if(t==="gift") document.getElementById("sound-gift").play();
});
</script>

</body>
</html>
