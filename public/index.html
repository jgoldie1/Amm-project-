<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIVE</title>

<style>
body { background:#111; color:#fff; text-align:center; }
#video { width:300px; height:200px; background:#000; }
#chat { height:150px; overflow:auto; border:1px solid #444; margin:10px; }

@keyframes up {
  from { transform:translateY(0); opacity:1; }
  to { transform:translateY(-200px); opacity:0; }
}
</style>
</head>

<body>

<h2>LIVE</h2>

<video id="video" autoplay muted playsinline></video>

<div>
❤️ <span id="hearts">0</span>
🎁 <span id="gifts">0</span>
💰 <span id="coins">0</span>
</div>

<button onclick="sendHeart()">❤️ TAP</button>
<button onclick="sendGift(1)">🎁1</button>
<button onclick="sendGift(10)">🎁10</button>

<div id="chat"></div>

<input id="msg">
<button onclick="send()">Send</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io(window.location.origin, {
  transports: ["websocket"]
});

// CAMERA
navigator.mediaDevices.getUserMedia({ video:true })
.then(stream => {
  const v = document.getElementById("video");
  v.srcObject = stream;
  v.play();
})
.catch(()=>console.log("no cam"));

// SEND
function send(){
  if(!msg.value) return;
  socket.emit("chat", msg.value);
  msg.value="";
}

// INSTANT TAP (no delay)
function sendHeart(){
  hearts.innerText = Number(hearts.innerText) + 1;
  coins.innerText = Number(coins.innerText) + 1;
  socket.emit("heart");
}

function sendGift(n){
  gifts.innerText = Number(gifts.innerText) + n;
  coins.innerText = Number(coins.innerText) + (n*10);
  socket.emit("gift", n);
}

// INIT
socket.on("init", d => {
  hearts.innerText = d.hearts || 0;
  gifts.innerText = d.gifts || 0;
  coins.innerText = d.coins || 0;
});

// UPDATE
socket.on("update", d => {
  hearts.innerText = d.hearts || 0;
  gifts.innerText = d.gifts || 0;
  coins.innerText = d.coins || 0;
});

// CHAT (NO UNDEFINED)
socket.on("chat", d => {
  if (!d || !d.text) return;

  const line = document.createElement("div");
  line.innerText = d.text;
  chat.appendChild(line);
});

// FX
socket.on("fx", d => {
  for(let i=0;i<d.power;i++){
    const el=document.createElement("div");
    el.innerText = d.type==="gift" ? "💰💥" : "❤️";
    el.style.position="fixed";
    el.style.bottom="0";
    el.style.left=Math.random()*100+"%";
    el.style.animation="up 1s linear";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
  }
});
</script>

</body>
</html>
