<button onclick="increment()">Tap</button>
<p id="count">0</p>

<script>
async function load() {
  const res = await fetch('/count');
  const data = await res.json();
  document.getElementById('count').innerText = data.count;
}

async function increment() {
  console.log("clicked");
  await fetch('/increment', { method: 'POST' });
  load();
}

load();
</script>
