<!DOCTYPE html>
<html>
<head>
  <title>Live App</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body style="background:black;color:white;font-family:sans-serif;text-align:center;">

<h2>🔴 LIVE</h2>

<!-- CAMERA -->
<video id="video" autoplay playsinline width="300" style="border:2px solid white;"></video>

<br><br>

<!-- HEART -->
<div style="font-size:20px;">
❤️ <span id="hearts">0</span>
</div>

<br>

<!-- CHAT -->
<div id="chat" style="height:200px;overflow:auto;border:1px solid white;margin:10px;"></div>

<!-- INPUT -->
<input id="msg" placeholder="Type message..." style="width:70%;padding:10px;">
<button onclick="send()">Send</button>
<button onclick="sendHeart()">❤️</button>

<script>
const socket = io();

let heartCount = 0;
let lastHeartTime = 0;

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  document.getElementById("video").srcObject = stream;
})
.catch(() => {
  alert("Allow camera access");
});

// SEND MESSAGE
function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text) return;

  socket.emit("chat", text);
  input.value = "";
  input.focus();
}

// ENTER KEY
document.getElementById("msg").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});

// HEART BUTTON
function sendHeart() {
  const now = Date.now();
  if (now - lastHeartTime < 1000) return;

  lastHeartTime = now;
  socket.emit("heart");
}

// RECEIVE CHAT
socket.on("chat", (msg) => {
  const div = document.getElementById("chat");
  const line = document.createElement("div");
  line.innerText = msg;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
});

// RECEIVE HEART
socket.on("heart", () => {
  heartCount++;
  document.getElementById("hearts").innerText = heartCount;
});
</script>

</body>
</html>
